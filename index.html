<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - 完整戰況看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { background-color: #10b981 !important; color: white !important; }
        .bracket-card { min-width: 180px; border-left: 4px solid #10b981; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-slate-900 text-white py-10 text-center shadow-xl">
        <h1 class="text-3xl font-black tracking-widest text-emerald-400">🍲 生態砂鍋盃</h1>
        <p class="text-[10px] text-slate-400 mt-2 font-bold tracking-[0.3em]">ECO-POT BADMINTON LIVE</p>
    </header>

    <nav class="max-w-md mx-auto px-4 -mt-8 sticky top-4 z-50">
        <div class="flex bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl p-1.5 border border-white/20">
            <button onclick="showPage('matches')" id="btn-matches" class="nav-btn flex-1 py-3 text-xs font-black rounded-xl transition-all tab-active">賽程</button>
            <button onclick="showPage('standing')" id="btn-standing" class="nav-btn flex-1 py-3 text-xs font-black rounded-xl transition-all text-slate-500">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="nav-btn flex-1 py-3 text-xs font-black rounded-xl transition-all text-slate-500">晉級圖</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4">
        
        <section id="page-matches" class="space-y-4">
            <div id="match-list" class="grid gap-4">
                <div class="text-center py-20 text-slate-400">同步雲端賽程中...</div>
            </div>
        </section>

        <section id="page-standing" class="hidden space-y-6">
            <div id="standing-container" class="grid gap-6 md:grid-cols-2">
                </div>
        </section>

        <section id="page-bracket" class="hidden overflow-x-auto no-scrollbar">
            <div id="bracket-flow" class="min-w-[800px] py-6 space-y-16">
                </div>
        </section>
    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        
        let allData = [];

        async function loadData() {
            try {
                const r = await fetch(sheetUrl);
                const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: String(r.c[0]?.v || ''), time: r.c[1]?.v || '', court: r.c[2]?.v || '',
                    type: r.c[3]?.v || '', teamA: r.c[4]?.v || 'TBD', teamB: r.c[5]?.v || 'TBD',
                    scoreA: r.c[6]?.v || 0, scoreB: r.c[7]?.v || 0, ref: r.c[8]?.v || '', status: r.c[9]?.v || '待賽'
                }));
                renderMatches();
                renderStandings();
                renderBracketFlow();
            } catch(e) { console.error("資料讀取錯誤"); }
        }

        function renderMatches() {
            const list = document.getElementById('match-list');
            list.innerHTML = allData.map(m => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center text-[10px] font-black mb-3 pb-2 border-b border-slate-50">
                        <div class="flex gap-2">
                            <span class="bg-slate-100 px-2 py-0.5 rounded text-slate-500 italic">${m.id}</span>
                            <span class="text-emerald-600">${m.type}</span>
                        </div>
                        <div class="text-slate-400">🕒 ${m.time} | 📍 ${m.court}</div>
                    </div>
                    <div class="flex items-center justify-between gap-4">
                        <div class="flex-1 text-center font-bold text-sm text-slate-700">${m.teamA}</div>
                        <div class="text-2xl font-black text-slate-900 px-4">${m.scoreA} : ${m.scoreB}</div>
                        <div class="flex-1 text-center font-bold text-sm text-slate-700">${m.teamB}</div>
                    </div>
                    <div class="mt-3 flex justify-between items-center text-[10px]">
                        <div class="text-slate-400 font-medium italic">裁判：${m.ref}</div>
                        <div class="${m.status==='進行中'?'text-orange-500 animate-pulse font-black':'text-slate-300 font-bold'}">${m.status}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderStandings() {
            const container = document.getElementById('standing-container');
            // 定義需要顯示的小組
            const groups = [
                { name: "男雙 (單循環)", filter: "男雙" },
                { name: "女雙 A組", filter: "女雙", sub: "A" },
                { name: "女雙 B組", filter: "女雙", sub: "B" },
                { name: "混雙 A組", filter: "混雙", sub: "A" },
                { name: "混雙 B組", filter: "混雙", sub: "B" },
                { name: "混雙 C組", filter: "混雙", sub: "C" }
            ];

            container.innerHTML = groups.map(g => {
                const stats = {};
                const groupMatches = allData.filter(m => {
                    const typeMatch = m.type.includes(g.filter);
                    const subMatch = g.sub ? m.id.startsWith(g.sub) : !m.type.match(/四強|決賽|季殿/);
                    // 排除掉明確標註四強或決賽的場次
                    return typeMatch && subMatch && !m.type.match(/四強|決賽|季殿/);
                });

                groupMatches.forEach(m => {
                    [m.teamA, m.teamB].forEach(t => { if(t && t!=='TBD' && !stats[t]) stats[t] = 0; });
                    if(m.status === "已結束") {
                        if(Number(m.scoreA) > Number(m.scoreB)) stats[m.teamA]++;
                        else if(Number(m.scoreB) > Number(m.scoreA)) stats[m.teamB]++;
                    }
                });

                const sorted = Object.entries(stats).sort((a,b) => b[1]-a[1]);
                if (sorted.length === 0) return ''; 

                return `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="bg-slate-50 px-4 py-2 border-b text-xs font-black text-slate-600 flex justify-between">
                            <span>🏆 ${g.name}</span>
                            <span class="text-[9px] text-slate-300 uppercase italic">Rankings</span>
                        </div>
                        <table class="w-full text-left text-sm">
                            ${sorted.map(([name, win], i) => `
                                <tr class="border-b border-slate-50 last:border-0">
                                    <td class="p-3 font-bold text-slate-700">${i+1}. ${name}</td>
                                    <td class="p-3 text-right font-black text-emerald-600">${win} 勝</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            }).join('');
        }

        function renderBracketFlow() {
            const flow = document.getElementById('bracket-flow');
            const cats = ["女雙", "混雙"];
            
            flow.innerHTML = cats.map(cat => {
                const semi1 = allData.find(m => m.type.includes(cat) && m.type.includes("四強") && m.id.includes("1")) || {teamA:'?', teamB:'?', scoreA:0, scoreB:0};
                const semi2 = allData.find(m => m.type.includes(cat) && m.type.includes("四強") && m.id.includes("2")) || {teamA:'?', teamB:'?', scoreA:0, scoreB:0};
                const final = allData.find(m => m.type.includes(cat) && m.type.includes("決賽")) || {teamA:'TBD', teamB:'TBD', scoreA:0, scoreB:0};
                
                return `
                <div class="relative">
                    <h3 class="text-center font-black text-slate-400 mb-8 italic tracking-widest underline decoration-emerald-500 decoration-2 underline-offset-4">${cat} 淘汰賽流程</h3>
                    <div class="flex items-center justify-between px-4">
                        <div class="space-y-10">
                            ${buildBracketNode(semi1, "四強 1")}
                            ${buildBracketNode(semi2, "四強 2")}
                        </div>
                        <div class="flex-1 flex justify-center">
                            <span class="text-slate-300 font-black text-2xl">➔</span>
                        </div>
                        <div class="flex flex-col items-center">
                            <div class="text-[9px] font-black text-amber-500 mb-2">🏆 CHAMPIONSHIP</div>
                            ${buildBracketNode(final, "決賽", true)}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function buildBracketNode(m, label, isFinal = false) {
            const isLive = m.status === '進行中';
            return `
                <div class="bracket-card bg-white rounded-xl shadow-lg p-3 ${isLive?'ring-2 ring-orange-400 animate-pulse':''}">
                    <div class="text-[8px] font-black text-slate-400 mb-2 flex justify-between uppercase">
                        <span>${label}</span>
                        <span>${m.status}</span>
                    </div>
                    <div class="space-y-1">
                        <div class="flex justify-between items-center gap-4">
                            <span class="text-[10px] font-bold text-slate-700 truncate w-24">${m.teamA
