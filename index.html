<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - LIVE 看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #010409; color: #f8fafc; }
        .tab-active { background-color: #10b981 !important; color: white !important; transform: translateY(-4px); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.5); }
        
        /* 1. 冠軍賽進行中：金紅最強閃爍 */
        @keyframes final-pulse {
            0%, 100% { transform: scale(1); border-color: #fbbf24; box-shadow: 0 0 20px #fbbf24; }
            50% { transform: scale(1.05); border-color: #ff0000; box-shadow: 0 0 60px #ff0000; filter: brightness(1.3); }
        }
        .status-live-final { animation: final-pulse 0.6s infinite ease-in-out !important; border-width: 8px !important; z-index: 50; }

        /* 2. 季軍賽進行中：橙紅火焰閃爍 (與冠軍區隔) */
        @keyframes third-pulse {
            0%, 100% { border-color: #9a3412; box-shadow: 0 0 10px #9a3412; }
            50% { border-color: #f97316; box-shadow: 0 0 40px #f97316; filter: brightness(1.2); }
        }
        .status-live-third { animation: third-pulse 0.8s infinite ease-in-out !important; border-width: 6px !important; }

        /* 3. 四強賽/一般賽進行中：綠色流光 */
        @keyframes live-glow { 0%, 100% { border-color: #1e293b; } 50% { border-color: #10b981; } }
        .status-live { animation: live-glow 1.2s infinite; border-width: 5px !important; }

        /* 方塊基礎色調 */
        .final-gold { background: linear-gradient(135deg, #f59e0b, #fbbf24) !important; color: #451a03 !important; }
        .sf-box { background-color: #1e1b4b !important; border: 4px solid #4338ca; }
        .third-box { background-color: #431407 !important; border: 4px solid #9a3412; }
        .qualified-row { border-left: 10px solid #10b981 !important; background: rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="pb-24">

    <header class="bg-black py-8 text-center border-b-4 border-emerald-500 shadow-2xl">
        <h1 class="text-5xl md:text-7xl font-black italic text-white tracking-tighter uppercase">🍲 生態砂鍋盃 
        </h1> <div class="mt-3 text-[10px] text-slate-500 font-bold tracking-[0.5em]">ECO POT LIVE</div>
    </header>

    <nav class="fixed bottom-4 left-0 right-0 md:sticky md:top-4 md:bottom-auto max-w-xl mx-auto px-4 z-[100]">
        <div class="flex bg-slate-900/95 backdrop-blur rounded-2xl p-2 border border-white/20 shadow-2xl">
            <button onclick="showPage('matches')" id="btn-matches" class="flex-1 py-4 text-xs font-black rounded-xl text-slate-400">賽程看板</button>
            <button onclick="showPage('standing')" id="btn-standing" class="flex-1 py-4 text-xs font-black rounded-xl text-slate-400">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="flex-1 py-4 text-xs font-black rounded-xl text-slate-400">晉級之路</button>
        </div>
    </nav>

    <main class="w-full max-w-[1400px] mx-auto p-4 mt-8">
        <div id="loading-msg" class="text-center py-20 text-emerald-500 font-black text-2xl animate-pulse">📡 正在同步砂鍋實況...</div>
        <section id="page-matches" class="hidden space-y-6"></section>
        <section id="page-standing" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8"></section>
        <section id="page-bracket" class="hidden space-y-20"></section>
    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        let allData = []; let groupWinners = {}; let isFirstLoad = true;

        async function loadData() {
            try {
                const r = await fetch(sheetUrl); const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: String(r.c[0]?.v || "").trim(),
                    time: r.c[1]?.v || "", court: r.c[2]?.v || "", type: String(r.c[3]?.v || "").trim(),
                    teamA: String(r.c[4]?.v || "TBD").trim(), teamB: String(r.c[5]?.v || "TBD").trim(),
                    scoreA: Number(r.c[6]?.v || 0), scoreB: Number(r.c[7]?.v || 0),
                    ref: String(r.c[8]?.v || "待定").trim(), status: String(r.c[9]?.v || "待賽").trim()
                }));
                document.getElementById('loading-msg').classList.add('hidden');
                renderAll();
                if(isFirstLoad) { showPage('matches'); isFirstLoad = false; }
            } catch(e) { console.error(e); }
        }

        function renderAll() { renderMatches(); renderStandings(); renderBracketFlow(); }

        // PAGE 1 
        function renderMatches() {
            const container = document.getElementById('page-matches');
            container.innerHTML = allData.map(m => {
                const isLive = m.status === '進行中';
                const isFinal = m.id.match(/冠亞|決賽/);
                const isThird = m.id.match(/季殿/);
                let theme = 'bg-emerald-600'; if(m.type.includes('女雙')) theme = 'bg-purple-600'; if(m.type.includes('混雙')) theme = 'bg-orange-600';
                
                let liveClass = "border-white/5";
                if(isLive) {
                    if(isFinal) liveClass = "status-live-final";
                    else if(isThird) liveClass = "status-live-third";
                    else liveClass = "status-live";
                }
                
                return `<div class="relative bg-slate-900 p-6 md:p-10 rounded-[2.5rem] flex flex-col md:flex-row items-center border-l-[12px] transition-all ${liveClass}">
                    <div class="absolute -top-3 left-10 ${theme} text-white px-4 py-1 rounded-full text-[10px] font-black z-10 shadow-lg">${m.type}</div>
                    <div class="flex-1 text-center md:text-right text-2xl md:text-4xl font-black text-white px-4 break-words w-full">${m.teamA}</div>
                    <div class="flex flex-col items-center justify-center min-w-[120px] md:min-w-[280px] my-4 md:my-0">
                        <div class="text-[10px] font-black text-slate-500 mb-1">${m.id}</div>
                        <div class="text-6xl md:text-8xl font-black italic tabular-nums text-emerald-400">${m.scoreA}:${m.scoreB}</div>
                        <div class="mt-4 flex flex-col items-center gap-1">
                             <span class="text-[10px] text-slate-400 font-bold tracking-tighter">📍 ${m.court} | ⚖️ 裁判: ${m.ref}</span>
                             <span class="${isLive ? 'bg-red-600 text-white px-4 py-0.5 rounded-full text-[10px] animate-pulse' : 'text-slate-600 text-[10px] font-bold'}">${m.status}</span>
                        </div>
                    </div>
                    <div class="flex-1 text-center md:text-left text-2xl md:text-4xl font-black text-white px-4 break-words w-full">${m.teamB}</div>
                </div>`;
            }).join('');
        }

        // PAGE 2 (積分榜)
        function renderStandings() {
            const container = document.getElementById('page-standing');
            const configs = [{title:"男雙",type:"男雙",sub:"M",top:2},{title:"女雙 A",type:"女雙",sub:"A",top:2},{title:"女雙 B",type:"女雙",sub:"B",top:2},{title:"混雙 A",type:"混雙",sub:"A",top:2},{title:"混雙 B",type:"混雙",sub:"B",top:1},{title:"混雙 C",type:"混雙",sub:"C",top:1}];
            groupWinners = {};
            container.innerHTML = configs.map(cfg => {
                const stats = {};
                const matches = allData.filter(m => m.type.includes(cfg.type) && m.id.startsWith(cfg.sub) && !m.id.match(/四強|冠亞|決賽|季殿/));
                matches.forEach(m => {
                    [ {n: m.teamA, s: m.scoreA}, {n: m.teamB, s: m.scoreB} ].forEach(t => {
                        if(t.n && t.n !== 'TBD') {
                            if(!stats[t.n]) stats[t.n] = { name: t.n, win: 0, pts: 0 };
                            if(m.status === "已結束") {
                                stats[t.n].pts += t.s;
                                if(t.s > (t.n === m.teamA ? m.scoreB : m.scoreA)) stats[t.n].win++;
                            }
                        }
                    });
                });
                const sorted = Object.values(stats).sort((a,b) => (b.win-a.win) || (b.pts-a.pts));
                groupWinners[cfg.type + cfg.sub] = sorted.map(d => d.name);
                if (sorted.length === 0) return "";
                return `<div class="bg-slate-900 rounded-[2rem] p-6 border border-white/5 shadow-2xl">
                    <h3 class="text-xl font-black text-emerald-400 mb-4 italic">${cfg.title}</h3>
                    <table class="w-full">
                        ${sorted.map((d,i) => `<tr class="border-b border-white/5 ${i < cfg.top ? 'qualified-row' : 'opacity-20'}"><td class="py-4 font-black text-lg pl-4">${d.name}</td><td class="text-right font-black text-emerald-500">${d.win} W</td><td class="text-right text-slate-500 pr-4">${d.pts} P</td></tr>`).join('')}
                    </table>
                </div>`;
            }).join('');
        }

        // PAGE 3 方塊組件
        function buildSymmetricBox(m, label, boxType, curA, curB) {
            const isF = boxType === "final", isT = boxType === "third", isLive = m.status === '進行中', isFinished = m.status === '已結束';
            let fA = (m.teamA && m.teamA !== "TBD" && !m.teamA.match(/勝方|敗方|第[12]名|組/)) ? m.teamA : curA;
            let fB = (m.teamB && m.teamB !== "TBD" && !m.teamB.match(/勝方|敗方|第[12]名|組/)) ? m.teamB : curB;

            let tagA = "", tagB = "";
            if(isFinished) {
                if(m.scoreA > m.scoreB) tagA = isF ? `<span class="ml-2 bg-white text-black px-2 py-0.5 rounded text-[10px] animate-bounce">🏆 冠軍</span>` : (isT ? `<span class="ml-2 bg-orange-200 text-orange-900 px-2 py-0.5 rounded text-[10px]">🥉 季軍</span>` : "");
                else if(m.scoreB > m.scoreA) tagB = isF ? `<span class="ml-2 bg-white text-black px-2 py-0.5 rounded text-[10px] animate-bounce">🏆 冠軍</span>` : (isT ? `<span class="ml-2 bg-orange-200 text-orange-900 px-2 py-0.5 rounded text-[10px]">🥉 季軍</span>` : "");
            }

            let liveClass = "";
            if(isLive) {
                if(isF) liveClass = "status-live-final";
                else if(isT) liveClass = "status-live-third";
                else liveClass = "status-live";
            }
            let styleClass = isF ? "final-gold" : (isT ? "third-box" : "sf-box");
            
            return `<div class="w-full max-w-[420px] rounded-[2.5rem] p-10 border-4 shadow-2xl transition-all ${styleClass} ${liveClass}">
                <div class="text-[10px] font-black mb-4 flex justify-between uppercase opacity-60"><span>${label}</span><span>${m.status}</span></div>
                <div class="space-y-4 font-black text-2xl md:text-3xl">
                    <div class="flex justify-between items-center"><div><span class="truncate max-w-[200px]">${fA}</span>${tagA}</div><span>${m.scoreA}</span></div>
                    <div class="flex justify-between items-center"><div><span class="truncate max-w-[200px]">${fB}</span>${tagB}</div><span>${m.scoreB}</span></div>
                </div>
            </div>`;
        }

        // --- PAGE 3 核心連動強化 ---
        function renderBracketFlow() {
            const container = document.getElementById('page-bracket'); container.innerHTML = "";
            ["女雙", "混雙"].forEach(cat => {
                const prefix = cat[0]; // '女' 或 '混'
                
                // 1. 積分預測
                let s1A = groupWinners[cat + "A"]?.[0] || 'A組1';
                let s1B = (cat === "女雙") ? (groupWinners["女雙B"]?.[1] || 'B組2') : (groupWinners["混雙B"]?.[0] || 'B組1');
                let s2A = (cat === "女雙") ? (groupWinners["女雙B"]?.[0] || 'B組1') : (groupWinners["混雙A"]?.[1] || 'A組2');
                let s2B = (cat === "女雙") ? (groupWinners["女雙A"]?.[1] || 'A組2') : (groupWinners["混雙C"]?.[0] || 'C組1');
                
                // 2. 搜尋實時場次 (使用 Regex 保險匹配：同時包含 類別+四強+數字)
                const s1 = allData.find(m => new RegExp(`${prefix}.*四強.*1`).test(m.id)) || {id:cat+"四強1",teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};
                const s2 = allData.find(m => new RegExp(`${prefix}.*四強.*2`).test(m.id)) || {id:cat+"四強2",teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};
                const f = allData.find(m => m.id.includes(prefix) && m.id.match(/冠亞|決賽/)) || {id:cat+"冠亞賽",teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};
                const t = allData.find(m => m.id.includes(prefix) && m.id.includes("季殿")) || {id:cat+"季殿賽",teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};

                // 3. 強制勝負判定
                let win1 = "四強1 勝方", lose1 = "四強1 敗方", win2 = "四強2 勝方", lose2 = "四強2 敗方";
                if(s1.status === "已結束") {
                    win1 = s1.scoreA > s1.scoreB ? s1.teamA : s1.teamB;
                    lose1 = s1.scoreA > s1.scoreB ? s1.teamB : s1.teamA;
                }
                if(s2.status === "已結束") {
                    win2 = s2.scoreA > s2.scoreB ? s2.teamA : s2.teamB;
                    lose2 = s2.scoreA > s2.scoreB ? s2.teamB : s2.teamA;
                }

                container.innerHTML += `
                <div class="flex flex-col items-center w-full px-4">
                    <h2 class="text-5xl md:text-7xl font-black italic mb-10 opacity-30 uppercase">${cat} FINALS</h2>
                    <div class="flex flex-col lg:flex-row items-center justify-center gap-8 w-full">
                        <div class="w-full flex justify-center">${buildSymmetricBox(s1, `${cat} 準決賽 1`, "sf", s1A, s1B)}</div>
                        <div class="flex flex-col gap-12 w-full items-center">
                            ${buildSymmetricBox(f, `👑 ${cat} 冠軍賽`, "final", win1, win2)}
                            ${buildSymmetricBox(t, `🥉 ${cat} 季殿賽`, "third", lose1, lose2)}
                        </div>
                        <div class="w-full flex justify-center">${buildSymmetricBox(s2, `${cat} 準決賽 2`, "sf", s2A, s2B)}</div>
                    </div>
                </div>`;
            });
        }

        function showPage(p) {
            ['matches', 'standing', 'bracket'].forEach(id => {
                const s = document.getElementById(`page-${id}`); const b = document.getElementById(`btn-${id}`);
                if(s) s.classList.add('hidden'); if(b) b.classList.remove('tab-active');
            });
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.getElementById(`btn-${p}`).classList.add('tab-active');
            window.scrollTo(0,0);
        }
        loadData(); setInterval(loadData, 8000);
    </script>
</body>
</html>
