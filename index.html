<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - LIVE 看板 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #010409; color: #f8fafc; overflow-x: hidden; }
        
        .tab-active { background-color: #10b981 !important; color: white !important; transform: translateY(-4px); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 動效區 */
        @keyframes shockwave { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8); } 100% { box-shadow: 0 0 0 50px rgba(239, 68, 68, 0); } }
        @keyframes thunder-glow { 0%, 100% { border-color: #ef4444; box-shadow: 0 0 30px #ef4444; background: rgba(239, 68, 68, 0.1); } 50% { border-color: #ffffff; box-shadow: 0 0 60px #fbbf24; background: rgba(251, 191, 36, 0.2); } }
        @keyframes gold-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* 狀態樣式 */
        .status-live-normal { animation: shockwave 1.2s infinite; border: 5px solid #ef4444 !important; }
        .status-live-critical { animation: thunder-glow 0.2s infinite; border: 8px solid #ffffff !important; z-index: 100; }
        
        .final-gold { 
            background: linear-gradient(-45deg, #f59e0b, #fef3c7, #d97706, #fbbf24) !important; 
            background-size: 400% 400% !important; animation: gold-flow 3s ease infinite !important; 
            border: 6px solid #ffffff !important;
            transform: scale(1.1); /* 決賽格位比四強大 10% */
        }

        /* Page 2 專用反白 (Page 3 已排除) */
        .eliminated { opacity: 0.25; filter: grayscale(1) blur(1px); }
        .qualified { border-left: 8px solid #10b981 !important; background: rgba(16, 185, 129, 0.05); }

        /* 文字清晰度 */
        .text-overlay { background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 8px; display: inline-block; }
        .final-gold .text-overlay { background: rgba(255,255,255,0.3); color: #451a03 !important; }
        .final-gold span, .final-gold div { color: #451a03 !important; }

        /* Page 3 結構容器 */
        .bracket-scroll-area { width: 100%; overflow-x: auto; padding: 100px 0; display: flex; justify-content: flex-start; }
        @media (min-width: 1500px) { .bracket-scroll-area { justify-content: center; } }
        .bracket-zoom-layer { transform: scale(0.8); transform-origin: center top; padding: 0 200px; min-width: max-content; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-black py-10 text-center border-b-4 border-emerald-500 shadow-2xl">
        <h1 class="text-5xl md:text-7xl font-black italic text-white tracking-tighter uppercase">🍲 生態砂鍋盃 
        </h1> <div class="mt-3 text-[10px] text-slate-500 font-bold tracking-[0.5em]">ECO POT LIVE</div>
    </header>

    <nav class="fixed bottom-4 left-0 right-0 md:sticky md:top-4 md:bottom-auto max-w-xl mx-auto px-4 z-[100]">
        <div class="flex bg-slate-900/95 backdrop-blur rounded-2xl p-2 border border-white/20 shadow-2xl">
            <button onclick="showPage('matches')" id="btn-matches" class="flex-1 py-4 text-sm font-black rounded-xl text-slate-400">賽程看板</button>
            <button onclick="showPage('standing')" id="btn-standing" class="flex-1 py-4 text-sm font-black rounded-xl text-slate-400">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="flex-1 py-4 text-sm font-black rounded-xl text-slate-400">晉級之路</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 mt-8">
        <div id="loading-msg" class="text-center py-20 text-emerald-500 font-black text-2xl animate-pulse">📡 正在更新對戰狀態...</div>
        <section id="page-matches" class="hidden space-y-8"></section>
        <section id="page-standing" class="hidden grid grid-cols-1 md:grid-cols-2 gap-10"></section>
        <section id="page-bracket" class="hidden">
            <div class="bracket-scroll-area no-scrollbar">
                <div id="bracket-flow" class="bracket-zoom-layer space-y-72"></div>
            </div>
        </section>
    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        let allData = []; let groupWinners = {}; let isFirstLoad = true;

        async function loadData() {
            try {
                const r = await fetch(sheetUrl); const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: String(r.c[0]?.v || "").toUpperCase().trim(),
                    time: r.c[1]?.v || "", court: r.c[2]?.v || "", type: String(r.c[3]?.v || ""),
                    teamA: String(r.c[4]?.v || "TBD").trim(), teamB: String(r.c[5]?.v || "TBD").trim(),
                    scoreA: Number(r.c[6]?.v || 0), scoreB: Number(r.c[7]?.v || 0),
                    ref: r.c[8]?.v || "", status: String(r.c[9]?.v || "待賽").trim()
                }));
                document.getElementById('loading-msg').classList.add('hidden');
                renderAll();
                if(isFirstLoad) { showPage('matches'); isFirstLoad = false; }
            } catch(e) { console.error(e); }
        }

        function renderAll() { renderMatches(); renderStandings(); renderBracketFlow(); }

        function renderMatches() {
            const container = document.getElementById('page-matches');
            container.innerHTML = allData.map(m => {
                const isLive = m.status === '進行中';
                const isCritical = m.type.match(/四強|決賽|季殿/i);
                let liveClass = isLive ? (isCritical ? "status-live-critical" : "status-live-normal") : "border-white/5";
                let theme = 'bg-emerald-600'; if(m.type.includes('女雙')) theme = 'bg-purple-600'; if(m.type.includes('混雙')) theme = 'bg-orange-600';
                return `<div class="relative bg-slate-900 p-8 md:p-12 rounded-[3.5rem] flex flex-row items-center border-l-[15px] ${liveClass}">
                    <div class="absolute -top-3 left-10 ${theme} text-white px-6 py-1 rounded-full text-[10px] md:text-sm font-black uppercase z-10 shadow-xl">${m.type}</div>
                    <div class="flex-1 text-right text-2xl md:text-5xl font-black pr-4 md:pr-10">${m.teamA}</div>
                    <div class="flex flex-col items-center justify-center min-w-[120px] md:min-w-[300px]">
                        <div class="text-[10px] font-black bg-white/10 text-slate-400 px-4 py-1 rounded-full mb-4 uppercase italic">Match ${m.id}</div>
                        <div class="text-5xl md:text-9xl font-black italic tabular-nums leading-none ${isLive && isCritical ? 'text-yellow-400' : 'text-white'}">${m.scoreA}:${m.scoreB}</div>
                        <div class="mt-6 flex flex-col items-center gap-2 text-[10px] md:text-sm font-bold text-slate-500 uppercase">
                            <div class="flex items-center gap-4"><span>🕒 ${m.time}</span><span>📍 ${m.court}</span><span class="${isLive ? 'text-white bg-red-600 px-2 rounded' : ''}">${m.status}</span></div>
                            <div class="text-emerald-500/80 tracking-widest">👤 REF: ${m.ref}</div>
                        </div>
                    </div>
                    <div class="flex-1 text-left text-2xl md:text-5xl font-black pl-4 md:pl-10">${m.teamB}</div>
                </div>`;
            }).join('');
        }

        function renderStandings() {
            const container = document.getElementById('page-standing');
            const configs = [{title:"男雙",type:"男雙",sub:"M",top:2},{title:"女雙 A",type:"女雙",sub:"A",top:2},{title:"女雙 B",type:"女雙",sub:"B",top:2},{title:"混雙 A",type:"混雙",sub:"A",top:2},{title:"混雙 B",type:"混雙",sub:"B",top:1},{title:"混雙 C",type:"混雙",sub:"C",top:1}];
            groupWinners = {};
            container.innerHTML = configs.map(cfg => {
                const stats = {};
                const matches = allData.filter(m => m.type.includes(cfg.type) && m.id.startsWith(cfg.sub) && !m.type.match(/四強|決賽|季殿/i));
                const isAllFinished = matches.length > 0 && matches.every(m => m.status === "已結束");
                matches.forEach(m => {
                    [ {n: m.teamA, s: m.scoreA}, {n: m.teamB, s: m.scoreB} ].forEach(t => {
                        if(t.n && t.n !== 'TBD') {
                            if(!stats[t.n]) stats[t.n] = { name: t.n, win: 0, score: 0, no: (t.n === m.teamA ? m.id.split('-')[0] : m.id.split('-')[1]) };
                            if(m.status === "已結束") {
                                stats[t.n].score += t.s;
                                if(t.s > (t.n === m.teamA ? m.scoreB : m.scoreA)) stats[t.n].win++;
                            }
                        }
                    });
                });
                const sorted = Object.values(stats).sort((a,b) => (b.win-a.win) || (b.score-a.score));
                groupWinners[cfg.type + cfg.sub] = sorted.map(d => d.name);
                if (sorted.length === 0) return "";
                return `<div class="bg-slate-900 rounded-[2.5rem] p-8 border border-white/5 shadow-2xl">
                    <div class="flex justify-between items-center mb-8">
                        <div><span class="text-2xl font-black text-emerald-400 italic">${cfg.title}</span><div class="text-[10px] text-slate-500 font-black">取前 ${cfg.top} 名晉級</div></div>
                        <span class="text-[10px] font-black text-slate-600 px-3 py-1 bg-white/5 rounded-full">${isAllFinished ? '🏁 結算' : '🕒 進行中'}</span>
                    </div>
                    <table class="w-full">
                        <thead class="text-[10px] font-black text-slate-500 border-b border-white/10 uppercase"><tr><th class="text-left pb-4">選手</th><th class="text-right pb-4">勝(W)</th><th class="text-right pb-4 pl-4">分(PTS)</th></tr></thead>
                        ${sorted.map((d,i) => {
                            const isQualified = i < cfg.top;
                            const rowClass = isAllFinished ? (isQualified ? "qualified" : "eliminated") : "";
                            let tag = (isAllFinished && isQualified) ? (cfg.title === "男雙" ? `<span class="ml-2 text-[10px] bg-yellow-500 text-black px-2 py-0.5 rounded">${i===0?'冠軍':'亞軍'}</span>` : `<span class="ml-2 text-[10px] bg-emerald-500 text-white px-2 py-0.5 rounded">第 ${i+1} 名</span>`) : "";
                            return `<tr class="border-b border-white/5 last:border-0 transition-all ${rowClass}"><td class="py-5 font-black text-xl flex items-center"><span class="text-slate-700 mr-3 text-sm">${d.no}</span><span class="truncate max-w-[180px]">${d.name}</span>${tag}</td><td class="text-right font-black text-emerald-400 text-xl">${d.win}</td><td class="text-right text-slate-500 pl-4 font-black italic text-xl">${d.score}</td></tr>`;
                        }).join('')}
                    </table>
                </div>`;
            }).join('');
        }

        // PAGE 3 方塊渲染 (強化版本)
        function buildSymmetricBox(m, label, type, curA, curB) {
            const isF = type === "final", isT = type === "third", isLive = m.status === '進行中', isFinished = m.status === '已結束';
            
            // 重要：優先抓取 Excel 資料，若為空或 TBD 則顯示自動填入的隊名
            let fA = (m.teamA && m.teamA !== "TBD" && !m.teamA.match(/組|第一|第二|勝者|敗者/)) ? m.teamA : curA;
            let fB = (m.teamB && m.teamB !== "TBD" && !m.teamB.match(/組|第一|第二|勝者|敗者/)) ? m.teamB : curB;

            let winnerTagA = "", winnerTagB = "";
            if (isFinished) {
                if (m.scoreA > m.scoreB) { winnerTagA = isF ? `<span class="ml-2 bg-white text-black px-2 py-1 rounded text-xs animate-bounce shadow-xl">🏆 冠軍</span>` : (isT ? `<span class="ml-2 bg-orange-200 text-orange-900 px-2 py-1 rounded text-xs">🥉 季軍</span>` : ""); }
                else if (m.scoreB > m.scoreA) { winnerTagB = isF ? `<span class="ml-2 bg-white text-black px-2 py-1 rounded text-xs animate-bounce shadow-xl">🏆 冠軍</span>` : (isT ? `<span class="ml-2 bg-orange-200 text-orange-900 px-2 py-1 rounded text-xs">🥉 季軍</span>` : ""); }
            }

            let s = "bg-slate-950 border-white/10"; 
            if (isF) s = "final-gold"; 
            if (isT) s = "bg-orange-950 border-orange-500/30 scale-105"; 
            if (isLive) s = (isF || isT) ? "status-live-critical" : "status-live-normal"; 
            
            return `<div class="w-[30rem] rounded-[4rem] p-12 border-4 shadow-2xl transition-all ${s}">
                <div class="text-[11px] font-black mb-10 flex justify-between uppercase tracking-[0.2em] items-center">
                    <span class="text-overlay ${isLive || isF ? 'text-white' : 'text-slate-500'}">${label}</span>
                    <span class="px-4 py-1 rounded-full ${isLive ? 'bg-white text-red-600 font-black' : 'bg-white/10 text-slate-500'}">${m.status}</span>
                </div>
                <div class="space-y-8 font-black text-5xl">
                    <div class="flex justify-between items-center"><div class="flex items-center"><span class="text-overlay truncate max-w-[240px]">${fA}</span>${winnerTagA}</div><span class="tabular-nums">${m.scoreA}</span></div>
                    <div class="flex justify-between items-center"><div class="flex items-center"><span class="text-overlay truncate max-w-[240px]">${fB}</span>${winnerTagB}</div><span class="tabular-nums">${m.scoreB}</span></div>
                </div>
            </div>`;
        }

        function renderBracketFlow() {
            const flow = document.getElementById('bracket-flow'); flow.innerHTML = "";
            ["女雙", "混雙"].forEach(cat => {
                let s1A, s1B, s2A, s2B;
                if (cat === "女雙") {
                    s1A = groupWinners["女雙A"]?.[0] || 'A組 第1'; s1B = groupWinners["女雙B"]?.[1] || 'B組 第2';
                    s2A = groupWinners["女雙B"]?.[0] || 'B組 第1'; s2B = groupWinners["女雙A"]?.[1] || 'A組 第2';
                } else {
                    s1A = groupWinners["混雙A"]?.[0] || 'A組 第1'; s1B = groupWinners["混雙B"]?.[0] || 'B組 第1';
                    s2A = groupWinners["混雙A"]?.[1] || 'A組 第2'; s2B = groupWinners["混雙C"]?.[0] || 'C組 第1';
                }
                
                const s1 = allData.find(m => m.type.includes(cat) && m.type.match(/四強|SF/i) && m.id.includes("1")) || {teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};
                const s2 = allData.find(m => m.type.includes(cat) && m.type.match(/四強|SF/i) && m.id.includes("2")) || {teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};
                const f = allData.find(m => m.type.includes(cat) && m.type.match(/決賽/i) && !m.type.includes("季殿")) || {teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};
                const t = allData.find(m => m.type.includes(cat) && m.type.match(/季殿/)) || {teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};

                // 智慧獲勝/敗方邏輯：僅當 SF 賽事結束時才更新
                const win1 = (s1.status === "已結束") ? (s1.scoreA > s1.scoreB ? s1.teamA : s1.teamB) : "SF1 勝方";
                const win2 = (s2.status === "已結束") ? (s2.scoreA > s2.scoreB ? s2.teamA : s2.teamB) : "SF2 勝方";
                const lose1 = (s1.status === "已結束") ? (s1.scoreA > s1.scoreB ? s1.teamB : s1.teamA) : "SF1 敗方";
                const lose2 = (s2.status === "已結束") ? (s2.scoreA > s2.scoreB ? s2.teamB : s2.teamA) : "SF2 敗方";

                flow.innerHTML += `<div class="relative py-16 w-full flex flex-col items-center">
                    <h3 class="text-center font-black text-6xl md:text-9xl text-white mb-40 italic uppercase tracking-tighter opacity-80">${cat} 系列總決賽</h3>
                    <div class="flex items-center gap-20 md:gap-32 relative">
                        <div>${buildSymmetricBox(s1, "Semi-Final 1", "normal", s1A, s1B)}</div>
                        <div class="flex flex-col items-center gap-32 relative">
                            <div class="h-1 w-[200%] bg-white/5 absolute top-1/2 -z-10 blur-2xl"></div>
                            ${buildSymmetricBox(f, "👑 CHAMPIONSHIP", "final", win1, win2)}
                            ${buildSymmetricBox(t, "🥉 3rd Place Match", "third", lose1, lose2)}
                        </div>
                        <div>${buildSymmetricBox(s2, "Semi-Final 2", "normal", s2A, s2B)}</div>
                    </div>
                </div>`;
            });
        }

        function showPage(p) {
            ['matches', 'standing', 'bracket'].forEach(id => {
                const s = document.getElementById(`page-${id}`), b = document.getElementById(`btn-${id}`);
                if(s) s.classList.add('hidden'); if(b) b.classList.remove('tab-active', 'text-slate-400');
            });
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.getElementById(`btn-${p}`).classList.add('tab-active');
            window.scrollTo(0,0);
        }
        loadData(); setInterval(loadData, 10000); // 每10秒強制更新
    </script>
</body>
</html>
