<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - LIVE 看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #020617; color: #f8fafc; }
        
        .tab-active { background-color: #10b981 !important; color: white !important; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 響應式：手機版與電腦版視覺分流 */
        @media (max-width: 768px) {
            .desktop-banner { display: none !important; }
            .mobile-card { display: block !important; }
        }
        @media (min-width: 769px) {
            .desktop-banner { display: block !important; }
            .mobile-card { display: none !important; }
        }

        /* 經典橫幅背景特效 */
        .match-banner {
            background: linear-gradient(90deg, rgba(15,23,42,1) 0%, rgba(30,41,59,0.8) 50%, rgba(15,23,42,1) 100%);
            transition: all 0.3s ease;
        }
        .match-banner:hover { transform: scale(1.01); border-color: rgba(16, 185, 129, 0.3); }

        /* 霓虹特效 */
        @keyframes neon-glow { 0%, 100% { border-color: #fbbf24; box-shadow: 0 0 10px rgba(251, 191, 36, 0.2); } 50% { border-color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); } }
        .final-neon { animation: neon-glow 2s infinite; border-width: 3px !important; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-slate-950 py-12 text-center border-b border-white/5 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
        <h1 class="text-5xl md:text-6xl font-black italic text-emerald-400 relative z-10 tracking-tighter">🍲 砂鍋盃 LIVE</h1>
        <div class="inline-block mt-4 px-4 py-1 bg-emerald-500/10 rounded-full relative z-10 border border-emerald-500/20">
            <p class="text-xs text-emerald-500 font-bold tracking-[0.5em] uppercase">ECO POT LIVE</p>
        </div>
    </header>

    <nav class="max-w-xl mx-auto px-4 -mt-7 sticky top-4 z-50">
        <div class="flex bg-slate-900/90 backdrop-blur-md rounded-2xl p-1.5 border border-white/10 shadow-2xl">
            <button onclick="showPage('matches')" id="btn-matches" class="flex-1 py-4 text-sm font-black rounded-xl tab-active transition-all">賽程看板</button>
            <button onclick="showPage('standing')" id="btn-standing" class="flex-1 py-4 text-sm font-black rounded-xl text-slate-400 transition-all">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="flex-1 py-4 text-sm font-black rounded-xl text-slate-400 transition-all">晉級之路</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 mt-8">
        <div id="loading-msg" class="text-center py-20 text-emerald-500 font-bold animate-pulse text-xl">📡 正在從雲端同步即時比分...</div>
        
        <section id="page-matches" class="hidden space-y-4"></section>
        
        <section id="page-standing" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8"></section>
        
        <section id="page-bracket" class="hidden overflow-x-auto no-scrollbar rounded-3xl p-6 md:p-12 bg-slate-950/40 border border-white/5 shadow-inner">
            <div id="bracket-flow" class="min-w-[1100px] space-y-32"></div>
        </section>
    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        let allData = [];
        let groupWinners = {};

        async function loadData() {
            try {
                const r = await fetch(sheetUrl);
                const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: String(r.c[0]?.v || "").toUpperCase().trim(),
                    time: r.c[1]?.v || "", court: r.c[2]?.v || "",
                    type: String(r.c[3]?.v || ""),
                    teamA: String(r.c[4]?.v || "TBD").trim(), teamB: String(r.c[5]?.v || "TBD").trim(),
                    scoreA: Number(r.c[6]?.v || 0), scoreB: Number(r.c[7]?.v || 0),
                    ref: r.c[8]?.v || "", status: String(r.c[9]?.v || "待賽").trim()
                }));
                document.getElementById('loading-msg').classList.add('hidden');
                renderAll();
            } catch(e) { console.error(e); }
        }

        function renderAll() {
            renderMatches();
            renderStandings(); 
            renderBracketFlow();
        }

        function renderMatches() {
            const container = document.getElementById('page-matches');
            container.innerHTML = allData.map(m => {
                const isLive = m.status === '進行中';
                const isElite = m.type.match(/四強|決賽|SF|Final/i);
                
                return `
                <div class="desktop-banner match-banner p-6 rounded-3xl border border-white/5 relative overflow-hidden ${isLive ? 'ring-1 ring-emerald-500' : ''}">
                    <div class="flex items-center justify-between relative z-10">
                        <div class="w-1/3 text-right">
                            <div class="text-[10px] text-slate-500 font-bold mb-1">${m.id} / ${m.type}</div>
                            <div class="text-2xl font-black text-white truncate">${m.teamA}</div>
                        </div>
                        <div class="flex flex-col items-center px-10">
                            <div class="text-4xl font-black italic text-emerald-400 tabular-nums">${m.scoreA} : ${m.scoreB}</div>
                            <div class="text-[10px] font-bold mt-2 px-3 py-0.5 rounded-full ${isLive?'bg-orange-500 text-white animate-pulse':'bg-slate-800 text-slate-500'}">${m.status}</div>
                        </div>
                        <div class="w-1/3 text-left">
                            <div class="text-[10px] text-slate-500 font-bold mb-1">${m.court} / ${m.time}</div>
                            <div class="text-2xl font-black text-white truncate">${m.teamB}</div>
                        </div>
                    </div>
                </div>

                <div class="mobile-card p-5 rounded-2xl bg-slate-900 border border-white/5 shadow-lg ${isElite?'bg-slate-800 border-amber-500/30':''}">
                    <div class="flex justify-between text-[9px] font-bold text-slate-500 mb-3 uppercase"><span>${m.id} | ${m.type}</span><span>${m.court}</span></div>
                    <div class="flex items-center justify-between font-black text-white">
                        <span class="flex-1 truncate">${m.teamA}</span>
                        <span class="px-4 text-2xl italic text-emerald-400 tabular-nums">${m.scoreA}:${m.scoreB}</span>
                        <span class="flex-1 text-right truncate">${m.teamB}</span>
                    </div>
                    <div class="mt-3 text-[9px] text-slate-600 font-bold flex justify-between"><span>裁判: ${m.ref}</span><span class="${isLive?'text-orange-500 animate-pulse':''}">${m.status}</span></div>
                </div>
                `;
            }).join('');
        }

        // 積分榜與晉級圖邏輯維持最新優化版
        function renderStandings() {
            const container = document.getElementById('page-standing');
            const configs = [
                { title: "男雙", type: "男雙", sub: "M", top: 2 },
                { title: "女雙 A", type: "女雙", sub: "A", top: 2 },
                { title: "女雙 B", type: "女雙", sub: "B", top: 2 },
                { title: "混雙 A", type: "混雙", sub: "A", top: 2 },
                { title: "混雙 B", type: "混雙", sub: "B", top: 1 },
                { title: "混雙 C", type: "混雙", sub: "C", top: 1 }
            ];
            groupWinners = {};
            container.innerHTML = configs.map(cfg => {
                const stats = {};
                const groupMatches = allData.filter(m => m.type.includes(cfg.type) && m.id.startsWith(cfg.sub) && !m.type.match(/四強|決賽|季殿/));
                const isAllFinished = groupMatches.length > 0 && groupMatches.every(m => m.status === "已結束");
                groupMatches.forEach(m => {
                    const codes = m.id.split('-');
                    if(m.teamA && m.teamA !== 'TBD' && !stats[m.teamA]) stats[m.teamA] = { name: m.teamA, win: 0, score: 0, code: codes[0] || cfg.sub };
                    if(m.teamB && m.teamB !== 'TBD' && !stats[m.teamB]) stats[m.teamB] = { name: m.teamB, win: 0, score: 0, code: codes[1] || cfg.sub };
                    if(m.status === "已結束") {
                        stats[m.teamA].score += m.scoreA; stats[m.teamB].score += m.scoreB;
                        if(m.scoreA > m.scoreB) stats[m.teamA].win++; else if(m.scoreB > m.scoreA) stats[m.teamB].win++;
                    }
                });
                const sorted = Object.values(stats).sort((a, b) => (b.win !== a.win) ? (b.win - a.win) : (b.score - a.score));
                groupWinners[cfg.type + cfg.sub] = sorted.map(d => d.name);
                if (sorted.length === 0) return "";

                return `<div class="bg-slate-900 rounded-3xl p-6 border border-white/5">
                    <div class="flex justify-between items-center mb-5"><span class="text-emerald-400 font-black italic">🏆 ${cfg.title}</span><span class="text-[10px] text-slate-500 uppercase">晉級: ${cfg.top}</span></div>
                    <table class="w-full text-sm desktop-banner">
                        ${sorted.map((d, i) => {
                            let medal = (isAllFinished && i < cfg.top) ? (i === 0 ? "🥇" : "🥈") : "";
                            return `<tr class="border-b border-white/5 last:border-0"><td class="py-4 font-bold"><span class="text-slate-500 mr-2 text-xs font-mono">${d.code}</span>${d.name} ${medal}</td><td class="py-4 text-right font-black text-emerald-400">${d.win} W</td><td class="py-4 text-right text-slate-500 italic">${d.score} pts</td></tr>`;
                        }).join('')}
                    </table>
                    <div class="mobile-card space-y-2">
                        ${sorted.map((d, i) => `<div class="bg-slate-800/40 p-3 rounded-xl flex justify-between items-center text-xs border border-white/5"><span class="font-bold text-white">${d.name}</span><span class="font-black text-emerald-400">${d.win}W / ${d.score}P</span></div>`).join('')}
                    </div>
                </div>`;
            }).join('');
        }

        function buildNode(m, label, type, curA, curB) {
            const isFinal = type === "final";
            const isOrange = type === "orange";
            const fA = /組|第一|第二|勝者|敗者/.test(m.teamA) || m.teamA === "TBD" ? curA : m.teamA;
            const fB = /組|第一|第二|勝者|敗者/.test(m.teamB) || m.teamB === "TBD" ? curB : m.teamB;
            return `<div class="bracket-node rounded-3xl p-6 border-2 ${isFinal?'final-neon bg-slate-900':'border-white/5 bg-slate-900/50'} ${isOrange?'border-orange-500/40':''}">
                <div class="text-[10px] font-black mb-4 flex justify-between uppercase"><span class="${isOrange?'text-orange-400':'text-slate-500'}">${label}</span><span>${m.status}</span></div>
                <div class="space-y-4 font-black text-xl text-white">
                    <div class="flex justify-between items-center"><span class="truncate w-44">${fA}</span><span class="text-emerald-400">${m.scoreA}</span></div>
                    <div class="flex justify-between items-center"><span class="truncate w-44">${fB}</span><span class="text-emerald-400">${m.scoreB}</span></div>
                </div>
            </div>`;
        }

        function renderBracketFlow() {
            const flow = document.getElementById('bracket-flow'); flow.innerHTML = "";
            ["女雙", "混雙"].forEach(cat => {
                let s1A, s1B, s2A, s2B;
                if (cat === "女雙") {
                    s1A = groupWinners["女雙A"]?.[0] || 'A組第一'; s1B = groupWinners["女雙B"]?.[1] || 'B組第二';
                    s2A = groupWinners["女雙B"]?.[0] || 'B組第一'; s2B = groupWinners["女雙A"]?.[1] || 'A組第二';
                } else {
                    s1A = groupWinners["混雙A"]?.[0] || 'A組第一'; s1B = groupWinners["混雙B"]?.[0] || 'B組第一';
                    s2A = groupWinners["混雙A"]?.[1] || 'A組第二'; s2B = groupWinners["混雙C"]?.[0] || 'C組第一';
                }
                const s1 = allData.find(m => m.type.includes(cat) && m.type.match(/四強|SF/i) && m.id.includes("1")) || {scoreA:0, scoreB:0, status:"待賽"};
                const s2 = allData.find(m => m.type.includes(cat) && m.type.match(/四強|SF/i) && m.id.includes("2")) || {scoreA:0, scoreB:0, status:"待賽"};
                const f = allData.find(m => m.type.includes(cat) && m.type.match(/決賽/i) && !m.type.includes("季殿")) || {scoreA:0, scoreB:0, status:"待賽"};
                const t = allData.find(m => m.type.includes(cat) && m.type.match(/季殿/)) || {scoreA:0, scoreB:0, status:"待賽"};
                let l1 = s1.status === "已結束" ? (s1.scoreA > s1.scoreB ? s1.teamB : s1.teamA) : "敗者 1";
                let l2 = s2.status === "已結束" ? (s2.scoreA > s2.scoreB ? s2.teamB : s2.teamA) : "敗者 2";

                flow.innerHTML += `<div class="p-10 rounded-[3rem] bg-slate-900/30 border border-white/5">
                    <h3 class="text-center font-black text-2xl text-white mb-16 italic uppercase tracking-tighter">${cat} Championship Flow</h3>
                    <div class="flex items-center justify-between gap-4">
                        <div class="w-80 space-y-12">${buildNode(s1, "Semi-Final 1", "normal", s1A, s1B)}${buildNode(s2, "Semi-Final 2", "normal", s2A, s2B)}</div>
                        <div class="h-1 flex-1 bg-slate-800"></div>
                        <div class="w-96 space-y-10">${buildNode(f, "🏆 Final Match", "final", "勝者 1", "勝者 2")}${buildNode(t, "🏅 3rd Place Match", "orange", l1, l2)}</div>
                    </div>
                </div>`;
            });
        }

        function showPage(p) {
            ['matches', 'standing', 'bracket'].forEach(id => {
                document.getElementById(`page-${id}`).classList.add('hidden');
                document.getElementById(`btn-${id}`).classList.remove('tab-active', 'text-slate-400');
            });
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.getElementById(`btn-${p}`).classList.add('tab-active');
            window.scrollTo(0,0);
        }

        loadData(); setInterval(loadData, 15000);
    </script>
</body>
</html>
