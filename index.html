<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - LIVE 看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0d1117; color: #ffffff; }
        .tab-active { background-color: #10b981 !important; color: white !important; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.6); }
        
        /* 投影機專用強化特效 */
        @keyframes final-super-glow {
            0%, 100% { border-color: #fbbf24; box-shadow: 0 0 30px #fbbf24, inset 0 0 15px #fbbf24; }
            50% { border-color: #ffffff; box-shadow: 0 0 60px #ffffff, inset 0 0 20px #ffffff; filter: brightness(1.5); }
        }
        .status-live-final { animation: final-super-glow 0.6s infinite ease-in-out !important; border-width: 10px !important; }

        @keyframes third-super-glow {
            0%, 100% { border-color: #ea580c; box-shadow: 0 0 20px #ea580c; }
            50% { border-color: #ffedd5; box-shadow: 0 0 45px #ffedd5; }
        }
        .status-live-third { animation: third-super-glow 1s infinite ease-in-out !important; border-width: 8px !important; }

        /* ⚡ 四強賽：極光青高亮特效 (新增) */
        @keyframes sf-live-glow {
            0%, 100% { border-color: #06b6d4; box-shadow: 0 0 20px #06b6d4, inset 0 0 10px #06b6d4; }
            50% { border-color: #ffffff; box-shadow: 0 0 50px #22d3ee, inset 0 0 20px #22d3ee; filter: brightness(1.3); }
        }
        .status-live-sf { animation: sf-live-glow 0.8s infinite ease-in-out !important; border-width: 8px !important; }

        @keyframes live-glow { 0%, 100% { border-color: #334155; } 50% { border-color: #34d399; } }
        .status-live { animation: live-glow 1.5s infinite; border-width: 6px !important; }

        .final-gold { background: linear-gradient(135deg, #b45309, #f59e0b) !important; color: #ffffff !important; }
        /* 優化四強方塊底色 */
        .sf-box { background-color: #083344 !important; border: 4px solid #06b6d4; }
        .third-box { background-color: #431407 !important; border: 4px solid #ea580c; }
        .qualified-row { border-left: 12px solid #34d399 !important; background: rgba(52, 211, 153, 0.15); }
        
        /* 場地標籤強化 - 確保投影清晰 */
        .info-tag-court { background-color: #064e3b; color: #ffffff; padding: 6px 16px; border-radius: 10px; font-weight: 900; font-size: 18px; border: 2px solid #34d399; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .info-tag-ref { background-color: #1e3a8a; color: #ffffff; padding: 4px 12px; border-radius: 8px; font-weight: 900; font-size: 14px; border: 1px solid #60a5fa; }
        
        /* PAGE2 獲獎者顯眼特效 */
        .winner-glow { color: #ffffff !important; text-shadow: 0 0 20px #fbbf24, 0 0 40px #fbbf24; font-size: 1.8rem !important; }
        .runner-up-glow { color: #ffffff !important; text-shadow: 0 0 15px #cbd5e1, 0 0 30px #cbd5e1; font-size: 1.5rem !important; }
        
        /* PAGE3 冠軍特效 */
        .final-winner-style { text-shadow: 0 0 30px rgba(255, 255, 255, 1); scale: 1.15; z-index: 20; filter: brightness(1.2); }
        
        /* 列表文字清晰度優化 */
        .team-name-display { color: #ffffff; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .score-display { color: #34d399; text-shadow: 0 0 20px rgba(52, 211, 153, 0.5); }
        @media (max-width: 767px) {
        #page-matches > div { padding: 1.5rem !important; flex-direction: column !important; }
        .team-name-display { font-size: 1.25rem !important; text-align: center !important; margin: 0.5rem 0; line-height: 1.2 !important; }
        .score-display { font-size: 4rem !important; line-height: 1 !important; }
        #page-bracket > div > div { display: flex !important; flex-direction: column !important; align-items: center !important; }
        .final-gold, .sf-box, .third-box { max-width: 100% !important; padding: 1.5rem !important; margin-bottom: 1rem; }
        .final-winner-style { font-size: 2rem !important; scale: 1 !important; }
        nav.fixed { bottom: 20px !important; }
    }
    </style>
</head>
<body class="pb-24">

    <header class="bg-black py-10 text-center border-b-8 border-emerald-500 shadow-2xl">
        <h1 class="text-5xl md:text-7xl font-black italic text-white tracking-tighter uppercase">🍲 生態砂鍋盃 
        </h1> <div class="mt-3 text-[10px] text-slate-500 font-bold tracking-[0.5em]">ECO POT LIVE</div>
    </header>

    <nav class="fixed bottom-6 left-0 right-0 md:sticky md:top-6 z-[100] max-w-lg mx-auto px-4">
        <div class="flex bg-slate-900/95 backdrop-blur-xl rounded-3xl p-2 border-2 border-white/30 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
            <button onclick="showPage('matches')" id="btn-matches" class="flex-1 py-5 text-sm font-black rounded-2xl text-slate-300">賽程看板</button>
            <button onclick="showPage('standing')" id="btn-standing" class="flex-1 py-5 text-sm font-black rounded-2xl text-slate-300">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="flex-1 py-5 text-sm font-black rounded-2xl text-slate-300">晉級之路</button>
        </div>
    </nav>

    <main class="w-full max-w-7xl mx-auto p-4 mt-8">
        <div id="loading-msg" class="text-center py-20 text-emerald-400 font-black text-3xl animate-pulse">📡 同步最新戰況中...</div>
        <section id="page-matches" class="hidden space-y-8"></section>
        <section id="page-standing" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-10"></section>
        <section id="page-bracket" class="hidden space-y-32"></section>
    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        let allData = []; let groupWinners = {}; let isFirstLoad = true;

        async function loadData() {
            try {
                const r = await fetch(sheetUrl); const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: String(r.c[0]?.v || "").trim(),
                    time: r.c[1]?.v || "", court: r.c[2]?.v || "", type: String(r.c[3]?.v || "").trim(),
                    teamA: String(r.c[4]?.v || "TBD").trim(), teamB: String(r.c[5]?.v || "TBD").trim(),
                    scoreA: Number(r.c[6]?.v || 0), scoreB: Number(r.c[7]?.v || 0),
                    ref: String(r.c[8]?.v || "待定").trim(), status: String(r.c[9]?.v || "待賽").trim()
                }));
                document.getElementById('loading-msg').classList.add('hidden');
                calculateRankings();
                renderAll();
                if(isFirstLoad) { showPage('matches'); isFirstLoad = false; }
            } catch(e) { console.error(e); }
        }

        function calculateRankings() {
            const configs = [
                {k:"男雙M",t:"男雙",s:"M"}, {k:"女雙A",t:"女雙",s:"A"}, {k:"女雙B",t:"女雙",s:"B"},
                {k:"混雙A",t:"混雙",s:"A"}, {k:"混雙B",t:"混雙",s:"B"}, {k:"混雙C",t:"混雙",s:"C"}
            ];
            groupWinners = {};
            configs.forEach(cfg => {
                const stats = {};
                const groupMatches = allData.filter(m => m.type.includes(cfg.t) && m.id.startsWith(cfg.s) && !m.id.match(/四強|冠亞|決賽|季殿/));
                const allFinished = groupMatches.length > 0 && groupMatches.every(m => m.status === "已結束");
                groupMatches.forEach(m => {
                    const idA = m.id.split('-')[0]; const idB = m.id.split('-')[1];
                    [ {n: m.teamA, s: m.scoreA, op: m.scoreB, code: idA}, {n: m.teamB, s: m.scoreB, op: m.scoreA, code: idB} ].forEach(t => {
                        if(t.n && t.n !== 'TBD' && !t.n.includes('組')) {
                            if(!stats[t.n]) stats[t.n] = { name: t.n, win: 0, pts: 0, code: t.code };
                            if(m.status === "已結束") {
                                stats[t.n].pts += t.s;
                                if(t.s > t.op) stats[t.n].win++;
                            }
                        }
                    });
                });
                groupWinners[cfg.k] = { list: Object.values(stats).sort((a,b) => (b.win-a.win) || (b.pts-a.pts)), allFinished: allFinished };
            });
        }

        function renderAll() { renderMatches(); renderStandings(); renderBracketFlow(); }

        function renderMatches() {
            const container = document.getElementById('page-matches');
            container.innerHTML = allData.map(m => {
                const isLive = m.status === '進行中';
                const isFinal = m.id.includes('冠亞') || m.id.includes('決賽');
                const isThird = m.id.includes('季殿');
                const isSF = m.id.includes('四強');
                let displayA = m.teamA; let displayB = m.teamB;
                if (isSF) {
                    const cat = m.type.includes('女') ? '女雙' : '混雙';
                    const getW = (k, idx, def) => (groupWinners[k] && groupWinners[k].list[idx]) ? groupWinners[k].list[idx].name : def;
                    if (m.id.includes('四強1')) {
                        if (displayA.match(/TBD|組|勝方/)) displayA = getW(cat+"A", 0, "A組1");
                        if (displayB.match(/TBD|組|勝方/)) displayB = (cat === '女雙') ? getW("女雙B", 1, "B組2") : getW("混雙B", 0, "B組1");
                    } else if (m.id.includes('四強2')) {
                        if (displayA.match(/TBD|組|勝方/)) displayA = (cat === '女雙') ? getW("女雙B", 0, "B組1") : getW("混雙A", 1, "A組2");
                        if (displayB.match(/TBD|組|勝方/)) displayB = (cat === '女雙') ? getW("女雙A", 1, "A組2") : getW("混雙C", 0, "C組1");
                    }
                }
                let theme = 'bg-emerald-600'; if(m.type.includes('女雙')) theme = 'bg-purple-700'; if(m.type.includes('混雙')) theme = 'bg-orange-700';
                
                // 動畫判定增加四強分支
                let liveClass = "border-white/10";
                if (isLive) {
                    if (isFinal) liveClass = "status-live-final";
                    else if (isThird) liveClass = "status-live-third";
                    else if (isSF) liveClass = "status-live-sf"; // 新增四強特效
                    else liveClass = "status-live";
                }

                return `<div class="relative bg-slate-900/50 p-8 md:p-12 rounded-[3rem] flex flex-col md:flex-row items-center border-l-[16px] shadow-xl ${liveClass}">
                    <div class="absolute -top-4 left-10 ${theme} text-white px-6 py-2 rounded-full text-xs font-black z-10 shadow-xl border-2 border-white/20">${m.type}</div>
                    <div class="flex-1 text-center md:text-right text-3xl md:text-4xl font-black text-white px-6 break-words w-full team-name-display">${displayA}</div>
                    <div class="flex flex-col items-center justify-center min-w-[160px] md:min-w-[320px] my-8 md:my-0">
                        <div class="flex gap-3 mb-4"><span class="info-tag-court">${m.court}</span><span class="info-tag-ref">⚖️ ${m.ref}</span></div>
                        <div class="text-8xl md:text-9xl font-black italic tabular-nums score-display leading-none">${m.scoreA}:${m.scoreB}</div>
                        <div class="mt-6 flex flex-col items-center text-md font-black text-slate-300 tracking-tighter uppercase">
                             <div class="bg-black/40 px-4 py-1 rounded-lg">${m.time} | ${m.id}</div>
                             <span class="${isLive ? 'bg-red-600 text-white px-8 py-2 rounded-full text-sm animate-pulse mt-3 border-2 border-white/50' : 'mt-3 text-emerald-400'}">${m.status}</span>
                        </div>
                    </div>
                    <div class="flex-1 text-center md:text-left text-3xl md:text-4xl font-black text-white px-6 break-words w-full team-name-display">${displayB}</div>
                </div>`;
            }).join('');
        }

        function renderStandings() {
            const container = document.getElementById('page-standing');
            const configs = [
                {title:"男雙組",k:"男雙M",top:2,q:"取前 2"}, {title:"女雙 A 組",k:"女雙A",top:2,q:"取前 2"},
                {title:"女雙 B 組",k:"女雙B",top:2,q:"取前 2"}, {title:"混雙 A 組",k:"混雙A",top:2,q:"取前 2"},
                {title:"混雙 B 組",k:"混雙B",top:1,q:"取前 1"}, {title:"混雙 C 組",k:"混雙C",top:1,q:"取前 1"}
            ];
            container.innerHTML = configs.map(cfg => {
                const groupData = groupWinners[cfg.k] || {list:[], allFinished: false};
                return `<div class="bg-slate-900 rounded-[2.5rem] p-8 border-2 border-white/5 shadow-2xl">
                    <div class="flex justify-between items-center mb-6"><h3 class="text-3xl font-black text-emerald-400 italic">${cfg.title}</h3><span class="bg-emerald-900 text-white px-4 py-1 rounded-xl text-sm font-black border border-emerald-500">${cfg.q}</span></div>
                    <table class="w-full text-left">
                        <thead><tr class="text-slate-400 border-b-2 border-white/10 text-sm font-black uppercase"><th class="py-3 pl-4">編號/隊名</th><th class="py-3 text-right">勝場</th><th class="py-3 text-right pr-4">總分</th></tr></thead>
                        <tbody>
                        ${groupData.list.map((d,i) => {
                            const isQualified = i < cfg.top;
                            const eliminationStyle = (groupData.allFinished && !isQualified) ? 'opacity-20' : 'opacity-100';
                            let rankTag = ""; let specialStyle = "";
                            if (groupData.allFinished) {
                                if (cfg.k === "男雙M") {
                                    if (i === 0) { rankTag = `<span class="ml-3 text-yellow-400 italic">🏆 冠軍</span>`; specialStyle = "winner-glow"; }
                                    else if (i === 1) { rankTag = `<span class="ml-3 text-slate-300 italic">🥈 亞軍</span>`; specialStyle = "runner-up-glow"; }
                                } else {
                                    if (i === 0) rankTag = `<span class="ml-3 text-emerald-300 font-black">● 第 1 名</span>`;
                                    else if (i === 1 && cfg.top >= 2) rankTag = `<span class="ml-3 text-slate-300 font-black">● 第 2 名</span>`;
                                }
                            }
                            return `<tr class="border-b border-white/10 ${eliminationStyle} ${isQualified ? 'qualified-row' : ''}">
                                <td class="py-6 font-black text-2xl pl-4">
                                    <div class="flex items-center transition-all duration-500 ${specialStyle}">
                                        <span class="text-emerald-400 mr-3 text-sm">[${d.code}]</span>
                                        <span class="text-white">${d.name}</span>${rankTag}
                                    </div>
                                </td>
                                <td class="text-right font-black text-3xl text-emerald-400">${d.win}</td>
                                <td class="text-right pr-4 font-black text-2xl text-slate-200">${d.pts}</td>
                            </tr>`;
                        }).join('')}
                        </tbody>
                    </table>
                </div>`;
            }).join('');
        }

        function buildSymmetricBox(m, label, boxType, defaultA, defaultB) {
            const isF = boxType === "final", isT = boxType === "third", isSF = boxType === "sf";
            const isLive = m.status === '進行中', isFinished = m.status === '已結束';
            let fA = (m.teamA && !m.teamA.match(/TBD|勝方|敗方|名|組/)) ? m.teamA : defaultA;
            let fB = (m.teamB && !m.teamB.match(/TBD|勝方|敗方|名|組/)) ? m.teamB : defaultB;
            let tagA = "", tagB = "";
            if (isFinished) {
                if (m.scoreA > m.scoreB) { tagA = isF ? " 🏆" : (isT ? " 🥉" : ""); tagB = isF ? " 🥈" : ""; }
                else if (m.scoreB > m.scoreA) { tagB = isF ? " 🏆" : (isT ? " 🥉" : ""); tagA = isF ? " 🥈" : ""; }
            }
            const winStyle = "text-5xl md:text-7xl final-winner-style";
            const styleA = (isF && isFinished && m.scoreA > m.scoreB) ? winStyle : "text-2xl md:text-3xl";
            const styleB = (isF && isFinished && m.scoreB > m.scoreA) ? winStyle : "text-2xl md:text-3xl";
            
            // 特效邏輯增加四強分支
            let liveClass = "";
            if (isLive) {
                if (isF) liveClass = "status-live-final";
                else if (isT) liveClass = "status-live-third";
                else if (isSF) liveClass = "status-live-sf"; // 新增四強特效
                else liveClass = "status-live";
            }
            
            let styleClass = isF ? "final-gold" : (isT ? "third-box" : "sf-box");
            return `<div class="w-full max-w-[450px] rounded-[3rem] p-10 border-4 shadow-2xl transition-all ${styleClass} ${liveClass}">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-sm font-black bg-black/40 px-4 py-2 rounded-xl uppercase tracking-widest border border-white/10">${label}</span>
                    <div class="flex gap-2"><span class="info-tag-court">${m.court}</span></div>
                </div>
                <div class="space-y-8">
                    <div class="flex justify-between items-center gap-6">
                        <div class="font-black break-words flex-1 uppercase transition-all duration-500 team-name-display ${styleA}">${fA}${tagA}</div>
                        <div class="text-5xl font-black italic score-display">${m.scoreA}</div>
                    </div>
                    <div class="flex justify-between items-center gap-6">
                        <div class="font-black break-words flex-1 uppercase transition-all duration-500 team-name-display ${styleB}">${fB}${tagB}</div>
                        <div class="text-5xl font-black italic score-display">${m.scoreB}</div>
                    </div>
                </div>
                <div class="mt-8 text-center border-t-2 border-white/10 pt-4 text-[16px] font-black text-white/80 uppercase">
                    ${m.status} | ${m.id}
                </div>
            </div>`;
        }

        function renderBracketFlow() {
            const container = document.getElementById('page-bracket'); container.innerHTML = "";
            ["女雙", "混雙"].forEach(cat => {
                const getWinnerName = (k, idx, def) => (groupWinners[k] && groupWinners[k].list[idx]) ? groupWinners[k].list[idx].name : def;
                let s1A = getWinnerName(cat+"A", 0, "A組 1");
                let s1B = (cat === "女雙") ? getWinnerName("女雙B", 1, "B組 2") : getWinnerName("混雙B", 0, "B組 1");
                let s2A = (cat === "女雙") ? getWinnerName("女雙B", 0, "B組 1") : getWinnerName("混雙A", 1, "A組 2");
                let s2B = (cat === "女雙") ? getWinnerName("女雙A", 1, "A組 2") : getWinnerName("混雙C", 0, "C組 1");
                const getM = (idTag) => allData.find(m => m.type.includes(cat) && m.id.includes(idTag)) || {id:cat+idTag,teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽",court:"待定"};
                const s1 = getM("四強1"), s2 = getM("四強2"), f = getM("冠亞"), t = getM("季殿");
                container.innerHTML += `<div class="flex flex-col items-center w-full px-4"><h2 class="text-7xl md:text-9xl font-black italic mb-16 opacity-10 uppercase tracking-tighter text-white">${cat} FINALS</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 items-center justify-center w-full max-w-7xl">
                        <div class="flex flex-col items-center gap-6 w-full">${buildSymmetricBox(s1, `準決賽 1`, "sf", s1A, s1B)}</div>
                        <div class="flex flex-col gap-16 w-full items-center py-12 lg:py-0 border-y-4 lg:border-y-0 lg:border-x-4 border-white/5">
                            ${buildSymmetricBox(f, `👑 冠亞賽`, "final", "SF1 勝方", "SF2 勝方")}
                            ${buildSymmetricBox(t, `🥉 季殿賽`, "third", "SF1 敗方", "SF2 敗方")}
                        </div>
                        <div class="flex flex-col items-center gap-6 w-full">${buildSymmetricBox(s2, `準決賽 2`, "sf", s2A, s2B)}</div>
                    </div></div>`;
            });
        }

        function showPage(p) {
            ['matches', 'standing', 'bracket'].forEach(id => {
                const s = document.getElementById(`page-${id}`); const b = document.getElementById(`btn-${id}`);
                if(s) s.classList.add('hidden'); if(b) b.classList.remove('tab-active');
            });
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.getElementById(`btn-${p}`).classList.add('tab-active');
            window.scrollTo(0,0);
        }
        loadData(); setInterval(loadData, 10000);
    </script>
</body>
</html>
