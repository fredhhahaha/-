<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - 專業競賽系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .tab-active { background-color: #059669 !important; color: white !important; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-slate-900 text-white pt-8 pb-12 text-center shadow-xl">
        <h1 class="text-3xl font-black tracking-widest text-emerald-400">🍲 生態砂鍋盃</h1>
        <p class="text-[10px] text-slate-400 mt-2 uppercase tracking-[0.2em]">Tournament Live Dashboard</p>
    </header>

    <nav class="max-w-md mx-auto px-4 -mt-6 sticky top-4 z-50">
        <div class="flex bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl p-1.5 border border-white/20">
            <button onclick="showPage('matches')" id="btn-matches" class="nav-btn flex-1 py-2.5 text-xs font-black rounded-xl transition-all tab-active">賽程看板</button>
            <button onclick="showPage('standing')" id="btn-standing" class="nav-btn flex-1 py-2.5 text-xs font-black rounded-xl transition-all text-slate-500">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="nav-btn flex-1 py-2.5 text-xs font-black rounded-xl transition-all text-slate-500">晉級圖</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 mt-4">
        
        <div id="filter-bar" class="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
            <button onclick="setFilter('全部')" class="filter-btn shrink-0 px-4 py-1.5 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold border border-emerald-200">全部</button>
            <button onclick="setFilter('男雙')" class="filter-btn shrink-0 px-4 py-1.5 bg-white text-slate-600 rounded-full text-xs font-bold border border-slate-200">男雙</button>
            <button onclick="setFilter('女雙')" class="filter-btn shrink-0 px-4 py-1.5 bg-white text-slate-600 rounded-full text-xs font-bold border border-slate-200">女雙</button>
            <button onclick="setFilter('混雙')" class="filter-btn shrink-0 px-4 py-1.5 bg-white text-slate-600 rounded-full text-xs font-bold border border-slate-200">混雙</button>
        </div>

        <section id="page-matches" class="space-y-4">
            <div id="match-list" class="grid gap-4">
                <div class="text-center py-10 text-slate-400">正在從雲端同步賽程...</div>
            </div>
        </section>

        <section id="page-standing" class="hidden space-y-6">
            <div id="standing-container"></div>
        </section>

        <section id="page-bracket" class="hidden">
            <div id="bracket-list" class="grid gap-6"></div>
        </section>

    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        
        let allData = [];
        let filter = '全部';

        async function loadData() {
            try {
                const r = await fetch(sheetUrl);
                const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: r.c[0]?.v || '', time: r.c[1]?.v || '', court: r.c[2]?.v || '',
                    type: r.c[3]?.v || '', teamA: r.c[4]?.v || 'TBD', teamB: r.c[5]?.v || 'TBD',
                    scoreA: r.c[6]?.v || 0, scoreB: r.c[7]?.v || 0, ref: r.c[8]?.v || '', status: r.c[9]?.v || '待賽'
                }));
                renderMatches();
                renderStandings();
                renderBrackets();
            } catch(e) { console.error("同步失敗"); }
        }

        function renderMatches() {
            const container = document.getElementById('match-list');
            const data = filter === '全部' ? allData : allData.filter(m => m.type.includes(filter));
            container.innerHTML = data.map(m => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-2 uppercase">
                        <span>${m.time} | ${m.court}</span>
                        <span class="text-emerald-600">${m.type}</span>
                    </div>
                    <div class="flex items-center">
                        <div class="flex-1 text-center text-sm font-bold px-2">${m.teamA}</div>
                        <div class="px-4 text-2xl font-black text-slate-800">${m.scoreA}:${m.scoreB}</div>
                        <div class="flex-1 text-center text-sm font-bold px-2">${m.teamB}</div>
                    </div>
                    <div class="mt-2 pt-2 border-t border-slate-50 flex justify-between text-[10px] text-slate-300">
                        <span>裁判: ${m.ref}</span>
                        <span class="${m.status==='進行中'?'text-orange-500 animate-pulse font-black':''}">${m.status}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderStandings() {
            const groups = ["男雙", "女雙", "混雙"];
            const container = document.getElementById('standing-container');
            container.innerHTML = groups.map(g => {
                const stats = {};
                // 只計算預賽，排除四強、決賽
                const groupMatches = allData.filter(m => m.type.includes(g) && !m.type.includes("四強") && !m.type.includes("決賽") && !m.type.includes("季殿"));
                
                groupMatches.forEach(m => {
                    [m.teamA, m.teamB].forEach(t => { if(t && t!=='TBD' && !stats[t]) stats[t] = 0; });
                    if(m.status === "已結束") {
                        if(m.scoreA > m.scoreB) stats[m.teamA]++;
                        else if(m.scoreB > m.scoreA) stats[m.teamB]++;
                    }
                });
                
                const sorted = Object.entries(stats).sort((a,b) => b[1]-a[1]);
                return `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                        <div class="bg-slate-50 px-4 py-2 text-xs font-black text-slate-500 border-b italic">${g} 排名預覽</div>
                        <table class="w-full text-left text-sm">
                            ${sorted.map(([name, win], i) => `
                                <tr class="border-b border-slate-50">
                                    <td class="p-3 font-bold text-slate-600">${i+1}. ${name}</td>
                                    <td class="p-3 text-right font-black text-emerald-600">${win} 勝</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            }).join('');
        }

        function renderBrackets() {
            const container = document.getElementById('bracket-list');
            const bracketData = allData.filter(m => m.type.includes("四強") || m.type.includes("決賽") || m.type.includes("季殿"));
            
            container.innerHTML = bracketData.map(m => `
                <div class="bg-slate-800 p-4 rounded-2xl shadow-xl text-white">
                    <div class="text-[10px] font-black text-emerald-400 mb-3 text-center tracking-widest uppercase">${m.type}</div>
                    <div class="grid grid-cols-3 items-center">
                        <div class="text-center text-xs font-bold leading-tight">${m.teamA}</div>
                        <div class="text-center">
                            <div class="text-xl font-black text-white">${m.scoreA} : ${m.scoreB}</div>
                            <div class="text-[9px] text-slate-500 font-bold mt-1">${m.status}</div>
                        </div>
                        <div class="text-center text-xs font-bold leading-tight">${m.teamB}</div>
                    </div>
                </div>
            `).join('');
        }

        function showPage(p) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('tab-active', 'text-slate-500'));
            document.getElementById(`btn-${p}`).classList.add('tab-active');
            // 切換時是否顯示過濾器
            document.getElementById('filter-bar').classList.toggle('hidden', p !== 'matches');
        }

        function setFilter(f) {
            filter = f;
            renderMatches();
        }

        loadData();
        setInterval(loadData, 30000); // 30秒更新
    </script>
</body>
</html>
