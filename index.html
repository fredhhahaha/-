<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - LIVE 看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #010409; color: #f8fafc; overflow-x: hidden; }
        
        .tab-active { background-color: #10b981 !important; color: white !important; transform: translateY(-4px); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 震波特效 */
        @keyframes shockwave {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.8); transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { box-shadow: 0 0 0 30px rgba(239, 68, 68, 0); transform: scale(1); }
        }
        .status-live { animation: shockwave 1.2s infinite cubic-bezier(0.66, 0, 0, 1) !important; background: #ef4444 !important; border: 3px solid #ffffff !important; z-index: 50; }
        .status-live * { color: white !important; }

        /* 決賽黃金背景 */
        @keyframes gold-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .final-gold { 
            background: linear-gradient(-45deg, #f59e0b, #fef3c7, #d97706, #fbbf24) !important; 
            background-size: 400% 400% !important; animation: gold-flow 3s ease infinite !important; 
            border: 3px solid #ffffff !important; box-shadow: 0 0 30px rgba(251, 191, 36, 0.5) !important; 
        }
        .final-gold * { color: #451a03 !important; }

        .line-glow { height: 4px; background: linear-gradient(90deg, transparent, #10b981, transparent); width: 100%; position: absolute; top: 50%; z-index: -1; }
    </style>
</head>
<body class="pb-10">

    <header class="bg-black py-10 text-center border-b-4 border-emerald-500">
        <h1 class="text-5xl font-black italic text-white tracking-tighter uppercase">🍲 生態砂鍋盃 <span class="text-emerald-500">ECO POT LIVE</span></h1>
    </header>

    <nav class="max-w-xl mx-auto px-4 -mt-8 sticky top-4 z-50">
        <div class="flex bg-slate-900 rounded-2xl p-2 border border-white/20 shadow-2xl">
            <button onclick="showPage('matches')" id="btn-matches" class="flex-1 py-4 text-sm font-black rounded-xl text-slate-400 transition-all">賽程看板</button>
            <button onclick="showPage('standing')" id="btn-standing" class="flex-1 py-4 text-sm font-black rounded-xl text-slate-400 transition-all">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="flex-1 py-4 text-sm font-black rounded-xl text-slate-400 transition-all">晉級之路</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 mt-16">
        <div id="loading-msg" class="text-center py-20 text-emerald-500 font-black text-2xl animate-pulse">📡 正在同步賽事資訊...</div>
        <section id="page-matches" class="hidden space-y-6"></section>
        <section id="page-standing" class="hidden grid grid-cols-1 md:grid-cols-2 gap-10"></section>
        <section id="page-bracket" class="hidden w-full overflow-x-auto no-scrollbar rounded-[3rem] p-8 md:p-16 bg-slate-900/40 border border-white/5 shadow-inner">
            <div id="bracket-flow" class="min-w-[1200px] flex flex-col items-center space-y-56"></div>
        </section>
    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        let allData = []; let groupWinners = {}; let isFirstLoad = true;

        async function loadData() {
            try {
                const r = await fetch(sheetUrl); const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: String(r.c[0]?.v || "").toUpperCase().trim(),
                    time: r.c[1]?.v || "", court: r.c[2]?.v || "", type: String(r.c[3]?.v || ""),
                    teamA: String(r.c[4]?.v || "TBD").trim(), teamB: String(r.c[5]?.v || "TBD").trim(),
                    scoreA: Number(r.c[6]?.v || 0), scoreB: Number(r.c[7]?.v || 0),
                    ref: r.c[8]?.v || "", status: String(r.c[9]?.v || "待賽").trim()
                }));
                document.getElementById('loading-msg').classList.add('hidden');
                renderAll();
                if(isFirstLoad) { showPage('matches'); isFirstLoad = false; }
            } catch(e) { console.error(e); }
        }

        function renderAll() { renderMatches(); renderStandings(); renderBracketFlow(); }

        // --- PAGE 1: 標示項目類別 ---
        function renderMatches() {
            const container = document.getElementById('page-matches');
            container.innerHTML = allData.map(m => {
                const isLive = m.status === '進行中';
                return `<div class="relative bg-slate-900 p-8 rounded-[2.5rem] flex items-center justify-between border-l-[12px] ${isLive ? 'border-red-600 shadow-[0_0_40px_rgba(239,68,68,0.3)] animate-pulse' : 'border-emerald-500'}">
                    <div class="absolute -top-3 left-10 bg-emerald-600 text-white px-4 py-1 rounded-full text-[10px] font-black tracking-widest uppercase shadow-lg">${m.type}</div>
                    
                    <div class="w-1/3 text-right text-3xl font-black truncate">${m.teamA}</div>
                    <div class="w-1/3 flex flex-col items-center">
                        <div class="text-[10px] font-black bg-white/5 text-slate-400 px-3 py-1 rounded mb-3 tracking-tighter">MATCH #${m.id}</div>
                        <div class="text-6xl font-black italic tracking-tighter tabular-nums">${m.scoreA} : ${m.scoreB}</div>
                        <div class="mt-5 flex items-center gap-4 text-[10px] font-bold text-slate-500 whitespace-nowrap">
                            <span>🕒 ${m.time}</span><span class="w-px h-2 bg-slate-700"></span><span>📍 ${m.court}</span><span class="w-px h-2 bg-slate-700"></span>
                            <span class="${isLive ? 'text-red-500 animate-bounce' : 'text-emerald-500'} font-black">${m.status}</span>
                        </div>
                    </div>
                    <div class="w-1/3 text-left text-3xl font-black truncate">${m.teamB}</div>
                </div>`;
            }).join('');
        }

        // --- PAGE 2: 標示勝場與總分 ---
        function renderStandings() {
            const container = document.getElementById('page-standing');
            const configs = [{title:"男雙",type:"男雙",sub:"M",top:2},{title:"女雙 A",type:"女雙",sub:"A",top:2},{title:"女雙 B",type:"女雙",sub:"B",top:2},{title:"混雙 A",type:"混雙",sub:"A",top:2},{title:"混雙 B",type:"混雙",sub:"B",top:1},{title:"混雙 C",type:"混雙",sub:"C",top:1}];
            groupWinners = {};
            container.innerHTML = configs.map(cfg => {
                const stats = {};
                const matches = allData.filter(m => m.type.includes(cfg.type) && m.id.startsWith(cfg.sub) && !m.type.match(/四強|決賽|季殿/i));
                matches.forEach(m => {
                    [ {n: m.teamA, s: m.scoreA}, {n: m.teamB, s: m.scoreB} ].forEach(t => {
                        if(t.n && t.n !== 'TBD') {
                            if(!stats[t.n]) stats[t.n] = { name: t.n, win: 0, score: 0, no: (t.n === m.teamA ? m.id.split('-')[0] : m.id.split('-')[1]) };
                            if(m.status === "已結束") {
                                stats[t.n].score += t.s;
                                if(t.s > (t.n === m.teamA ? m.scoreB : m.scoreA)) stats[t.n].win++;
                            }
                        }
                    });
                });
                const sorted = Object.values(stats).sort((a,b) => (b.win-a.win) || (b.score-a.score));
                groupWinners[cfg.type + cfg.sub] = sorted.map(d => d.name);
                if (sorted.length === 0) return "";
                return `<div class="bg-slate-900 rounded-[2.5rem] p-8 border border-white/10 shadow-2xl">
                    <div class="flex justify-between items-center mb-6"><span class="text-2xl font-black text-emerald-400 italic">${cfg.title}</span><span class="text-[10px] bg-white/5 px-2 py-1 rounded text-slate-500 font-bold">名額: ${cfg.top}</span></div>
                    <table class="w-full">
                        <thead class="text-[11px] text-slate-500 font-black border-b border-white/10 uppercase tracking-widest">
                            <tr><th class="text-left pb-3">選手/編號</th><th class="text-right pb-3">勝場 (WIN)</th><th class="text-right pb-3">總分 (PTS)</th></tr>
                        </thead>
                        ${sorted.map((d,i) => `<tr class="border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors"><td class="py-5 font-black"><span class="text-emerald-500/50 mr-4 tabular-nums">${d.no}</span>${d.name} ${i<cfg.top?'🥇':''}</td><td class="text-right font-black text-emerald-400 text-xl">${d.win}</td><td class="text-right text-slate-400 font-black pl-6 italic text-xl">${d.score}</td></tr>`).join('')}
                    </table>
                </div>`;
            }).join('');
        }

        // --- PAGE 3: 四強決賽邏輯 ---
        function buildSymmetricBox(m, label, type, curA, curB) {
            const isF = type === "final"; const isT = type === "third"; const isLive = m.status === '進行中';
            const fA = /組|第一|第二|勝者|敗者/.test(m.teamA) || m.teamA === "TBD" ? curA : m.teamA;
            const fB = /組|第一|第二|勝者|敗者/.test(m.teamB) || m.teamB === "TBD" ? curB : m.teamB;
            let s = "bg-slate-950 border-emerald-500/40"; 
            if (isF) s = "final-gold"; if (isT) s = "bg-orange-950 border-orange-500/50";
            if (isLive) s = "status-live";
            return `<div class="w-96 rounded-[3rem] p-10 border-4 transition-all ${s} shadow-2xl">
                <div class="text-xs font-black mb-8 flex justify-between uppercase tracking-widest"><span>${label}</span><span class="px-2 py-0.5 rounded ${isLive?'bg-white text-red-600 animate-pulse':'bg-white/10'}">${m.status}</span></div>
                <div class="space-y-8 font-black text-4xl"><div class="flex justify-between items-center"><span>${fA}</span><span class="tabular-nums">${m.scoreA}</span></div><div class="flex justify-between items-center"><span>${fB}</span><span class="tabular-nums">${m.scoreB}</span></div></div>
                ${isLive ? '<div class="mt-8 text-sm text-center font-black animate-bounce tracking-[0.3em]">● NOW PLAYING</div>' : ''}
            </div>`;
        }

        function renderBracketFlow() {
            const flow = document.getElementById('bracket-flow'); flow.innerHTML = "";
            ["女雙", "混雙"].forEach(cat => {
                let s1A, s1B, s2A, s2B;
                if (cat === "女雙") {
                    s1A = groupWinners["女雙A"]?.[0] || 'A1 第一'; s1B = groupWinners["女雙B"]?.[1] || 'B2 第二';
                    s2A = groupWinners["女雙B"]?.[0] || 'B1 第一'; s2B = groupWinners["女雙A"]?.[1] || 'A2 第二';
                } else {
                    s1A = groupWinners["混雙A"]?.[0] || 'A1 第一'; s1B = groupWinners["混雙B"]?.[0] || 'B1 第一';
                    s2A = groupWinners["混雙A"]?.[1] || 'A2 第二'; s2B = groupWinners["混雙C"]?.[0] || 'C1 第一';
                }
                const s1 = allData.find(m => m.type.includes(cat) && m.type.match(/四強|SF/i) && m.id.includes("1")) || {scoreA:0,scoreB:0,status:"待賽"};
                const s2 = allData.find(m => m.type.includes(cat) && m.type.match(/四強|SF/i) && m.id.includes("2")) || {scoreA:0,scoreB:0,status:"待賽"};
                const f = allData.find(m => m.type.includes(cat) && m.type.match(/決賽/i) && !m.type.includes("季殿")) || {scoreA:0,scoreB:0,status:"待賽"};
                const t = allData.find(m => m.type.includes(cat) && m.type.match(/季殿/)) || {scoreA:0,scoreB:0,status:"待賽"};
                let l1 = s1.status === "已結束" ? (s1.scoreA > s1.scoreB ? s1.teamB : s1.teamA) : "SF1 敗者";
                let l2 = s2.status === "已結束" ? (s2.scoreA > s2.scoreB ? s2.teamB : s2.teamA) : "SF2 敗者";
                flow.innerHTML += `<div class="w-full relative">
                    <h3 class="text-center font-black text-6xl text-white mb-28 italic uppercase tracking-tighter opacity-90">${cat} 系列總決賽</h3>
                    <div class="flex items-center justify-between gap-12 relative">
                        <div class="flex-1 flex justify-start">${buildSymmetricBox(s1, "Semi-Final 1", "normal", s1A, s1B)}</div>
                        <div class="flex-[1.5] flex flex-col items-center gap-20 relative">
                            <div class="line-glow"></div>
                            ${buildSymmetricBox(f, "👑 GRAND FINAL", "final", "勝者 1", "勝者 2")}
                            ${buildSymmetricBox(t, "🥉 3rd Place Match", "third", l1, l2)}
                        </div>
                        <div class="flex-1 flex justify-end">${buildSymmetricBox(s2, "Semi-Final 2", "normal", s2A, s2B)}</div>
                    </div>
                </div>`;
            });
        }

        function showPage(p) {
            ['matches', 'standing', 'bracket'].forEach(id => {
                const s = document.getElementById(`page-${id}`), b = document.getElementById(`btn-${id}`);
                if(s) s.classList.add('hidden'); if(b) b.classList.remove('tab-active', 'text-slate-400');
            });
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.getElementById(`btn-${p}`).classList.add('tab-active');
            window.scrollTo(0,0);
        }
        loadData(); setInterval(loadData, 15000);
    </script>
</body>
</html>
