<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - LIVE 看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0d1117; color: #ffffff; overflow-x: hidden; }
        .tab-active { background-color: #10b981 !important; color: white !important; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(16, 185, 129, 0.6); }
        
        /* 投影機/大螢幕強化特效 */
        @keyframes final-super-glow {
            0%, 100% { border-color: #fbbf24; box-shadow: 0 0 30px #fbbf24, inset 0 0 15px #fbbf24; }
            50% { border-color: #ffffff; box-shadow: 0 0 60px #ffffff, inset 0 0 20px #ffffff; filter: brightness(1.5); }
        }
        .status-live-final { animation: final-super-glow 0.6s infinite ease-in-out !important; border-width: 6px !important; }
        @media (min-width: 768px) { .status-live-final { border-width: 10px !important; } }

        @keyframes live-glow { 0%, 100% { border-color: #334155; } 50% { border-color: #34d399; } }
        .status-live { animation: live-glow 1.5s infinite; border-width: 4px !important; }
        @media (min-width: 768px) { .status-live { border-width: 6px !important; } }

        .final-gold { background: linear-gradient(135deg, #b45309, #f59e0b) !important; color: #ffffff !important; }
        .sf-box { background-color: #1e1b4b !important; border: 3px solid #6366f1; }
        .third-box { background-color: #431407 !important; border: 3px solid #ea580c; }
        .qualified-row { border-left: 8px solid #34d399 !important; background: rgba(52, 211, 153, 0.15); }
        @media (min-width: 768px) { .qualified-row { border-left: 12px solid #34d399 !important; } }
        
        .info-tag-court { background-color: #064e3b; color: #ffffff; padding: 4px 10px; border-radius: 8px; font-weight: 900; font-size: 14px; border: 1px solid #34d399; }
        @media (min-width: 768px) { .info-tag-court { padding: 6px 16px; font-size: 18px; border-width: 2px; } }
        
        .info-tag-ref { background-color: #1e3a8a; color: #ffffff; padding: 2px 8px; border-radius: 6px; font-weight: 900; font-size: 12px; border: 1px solid #60a5fa; }
        
        /* 獲獎者顯眼特效 */
        .winner-glow { color: #ffffff !important; text-shadow: 0 0 15px #fbbf24; font-size: 1.4rem !important; }
        @media (min-width: 768px) { .winner-glow { text-shadow: 0 0 20px #fbbf24, 0 0 40px #fbbf24; font-size: 1.8rem !important; } }
        .runner-up-glow { color: #ffffff !important; text-shadow: 0 0 10px #cbd5e1; font-size: 1.2rem !important; }
        @media (min-width: 768px) { .runner-up-glow { text-shadow: 0 0 15px #cbd5e1, 0 0 30px #cbd5e1; font-size: 1.5rem !important; } }
        
        .final-winner-style { text-shadow: 0 0 20px rgba(255, 255, 255, 1); scale: 1.05; }
        @media (min-width: 768px) { .final-winner-style { text-shadow: 0 0 30px rgba(255, 255, 255, 1); scale: 1.15; } }
        
        .team-name-display { color: #ffffff; font-weight: 900; }
        .score-display { color: #34d399; text-shadow: 0 0 15px rgba(52, 211, 153, 0.4); }
    </style>
</head>
<body class="pb-32 md:pb-24">

    <header class="bg-black py-6 md:py-10 text-center border-b-4 md:border-b-8 border-emerald-500 shadow-2xl">
        <h1 class="text-5xl md:text-7xl font-black italic text-white tracking-tighter uppercase">🍲 生態砂鍋盃 
        </h1> <div class="mt-3 text-[10px] text-slate-500 font-bold tracking-[0.5em]">ECO POT LIVE</div>
    </header>

    <nav class="fixed bottom-4 left-0 right-0 md:sticky md:top-6 z-[100] max-w-lg mx-auto px-4">
        <div class="flex bg-slate-900/95 backdrop-blur-xl rounded-2xl md:rounded-3xl p-1.5 md:p-2 border border-white/20 shadow-2xl">
            <button onclick="showPage('matches')" id="btn-matches" class="flex-1 py-3 md:py-5 text-xs md:text-sm font-black rounded-xl md:rounded-2xl text-slate-300">賽程看板</button>
            <button onclick="showPage('standing')" id="btn-standing" class="flex-1 py-3 md:py-5 text-xs md:text-sm font-black rounded-xl md:rounded-2xl text-slate-300">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="flex-1 py-3 md:py-5 text-xs md:text-sm font-black rounded-xl md:rounded-2xl text-slate-300">晉級之路</button>
        </div>
    </nav>

    <main class="w-full max-w-7xl mx-auto p-2 md:p-4 mt-4 md:mt-8">
        <div id="loading-msg" class="text-center py-20 text-emerald-400 font-black text-xl md:text-3xl animate-pulse">📡 同步最新戰況中...</div>
        <section id="page-matches" class="hidden space-y-4 md:space-y-8"></section>
        <section id="page-standing" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-10"></section>
        <section id="page-bracket" class="hidden space-y-16 md:space-y-32"></section>
    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        let allData = []; let groupWinners = {}; let isFirstLoad = true;

        async function loadData() {
            try {
                const r = await fetch(sheetUrl); const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: String(r.c[0]?.v || "").trim(),
                    time: r.c[1]?.v || "", court: r.c[2]?.v || "", type: String(r.c[3]?.v || "").trim(),
                    teamA: String(r.c[4]?.v || "TBD").trim(), teamB: String(r.c[5]?.v || "TBD").trim(),
                    scoreA: Number(r.c[6]?.v || 0), scoreB: Number(r.c[7]?.v || 0),
                    ref: String(r.c[8]?.v || "待定").trim(), status: String(r.c[9]?.v || "待賽").trim()
                }));
                document.getElementById('loading-msg').classList.add('hidden');
                calculateRankings();
                renderAll();
                if(isFirstLoad) { showPage('matches'); isFirstLoad = false; }
            } catch(e) { console.error(e); }
        }

        function calculateRankings() {
            const configs = [
                {k:"男雙M",t:"男雙",s:"M"}, {k:"女雙A",t:"女雙",s:"A"}, {k:"女雙B",t:"女雙",s:"B"},
                {k:"混雙A",t:"混雙",s:"A"}, {k:"混雙B",t:"混雙",s:"B"}, {k:"混雙C",t:"混雙",s:"C"}
            ];
            groupWinners = {};
            configs.forEach(cfg => {
                const stats = {};
                const groupMatches = allData.filter(m => m.type.includes(cfg.t) && m.id.startsWith(cfg.s) && !m.id.match(/四強|冠亞|決賽|季殿/));
                const allFinished = groupMatches.length > 0 && groupMatches.every(m => m.status === "已結束");
                groupMatches.forEach(m => {
                    const idA = m.id.split('-')[0]; const idB = m.id.split('-')[1];
                    [ {n: m.teamA, s: m.scoreA, op: m.scoreB, code: idA}, {n: m.teamB, s: m.scoreB, op: m.scoreA, code: idB} ].forEach(t => {
                        if(t.n && t.n !== 'TBD' && !t.n.includes('組')) {
                            if(!stats[t.n]) stats[t.n] = { name: t.n, win: 0, pts: 0, code: t.code };
                            if(m.status === "已結束") {
                                stats[t.n].pts += t.s;
                                if(t.s > t.op) stats[t.n].win++;
                            }
                        }
                    });
                });
                groupWinners[cfg.k] = { list: Object.values(stats).sort((a,b) => (b.win-a.win) || (b.pts-a.pts)), allFinished: allFinished };
            });
        }

        function renderAll() { renderMatches(); renderStandings(); renderBracketFlow(); }

        function renderMatches() {
            const container = document.getElementById('page-matches');
            container.innerHTML = allData.map(m => {
                const isLive = m.status === '進行中';
                const isFinal = m.id.includes('冠亞') || m.id.includes('決賽');
                let displayA = m.teamA; let displayB = m.teamB;
                let theme = 'bg-emerald-600'; if(m.type.includes('女雙')) theme = 'bg-purple-700'; if(m.type.includes('混雙')) theme = 'bg-orange-700';
                let liveClass = isLive ? (isFinal ? "status-live-final" : "status-live") : "border-white/10";
                
                return `<div class="relative bg-slate-900/50 p-4 md:p-12 rounded-2xl md:rounded-[3rem] flex flex-col md:flex-row items-center border-l-[8px] md:border-l-[16px] shadow-xl ${liveClass}">
                    <div class="absolute -top-3 left-6 md:-top-4 md:left-10 ${theme} text-white px-3 py-1 md:px-6 md:py-2 rounded-full text-[10px] md:text-xs font-black z-10 shadow-xl border border-white/20">${m.type}</div>
                    
                    <div class="flex-1 text-center md:text-right text-xl md:text-4xl font-black text-white px-2 md:px-6 break-words w-full team-name-display order-2 md:order-1">${displayA}</div>
                    
                    <div class="flex flex-col items-center justify-center min-w-full md:min-w-[320px] my-2 md:my-0 order-1 md:order-2">
                        <div class="flex gap-2 md:gap-3 mb-2 md:mb-4">
                            <span class="info-tag-court">${m.court}</span>
                            <span class="info-tag-ref">⚖️ ${m.ref}</span>
                        </div>
                        <div class="text-5xl md:text-9xl font-black italic tabular-nums score-display leading-tight md:leading-none">${m.scoreA}:${m.scoreB}</div>
                        <div class="mt-2 md:mt-6 flex flex-col items-center text-xs md:text-md font-black text-slate-300 uppercase">
                             <div class="bg-black/40 px-3 py-1 rounded-lg">${m.time} | ${m.id}</div>
                             <span class="${isLive ? 'bg-red-600 text-white px-4 py-1 rounded-full animate-pulse mt-2 border border-white/50' : 'mt-2 text-emerald-400'}">${m.status}</span>
                        </div>
                    </div>
                    
                    <div class="flex-1 text-center md:text-left text-xl md:text-4xl font-black text-white px-2 md:px-6 break-words w-full team-name-display order-3">${displayB}</div>
                </div>`;
            }).join('');
        }

        function renderStandings() {
            const container = document.getElementById('page-standing');
            const configs = [
                {title:"男雙組",k:"男雙M",top:2,q:"取 2"}, {title:"女雙 A",k:"女雙A",top:2,q:"取 2"},
                {title:"女雙 B",k:"女雙B",top:2,q:"取 2"}, {title:"混雙 A",k:"混雙A",top:2,q:"取 2"},
                {title:"混雙 B",k:"混雙B",top:1,q:"取 1"}, {title:"混雙 C",k:"混雙C",top:1,q:"取 1"}
            ];
            container.innerHTML = configs.map(cfg => {
                const groupData = groupWinners[cfg.k] || {list:[], allFinished: false};
                return `<div class="bg-slate-900 rounded-2xl md:rounded-[2.5rem] p-4 md:p-8 border border-white/10 shadow-2xl">
                    <div class="flex justify-between items-center mb-4 md:mb-6"><h3 class="text-xl md:text-3xl font-black text-emerald-400 italic">${cfg.title}</h3><span class="bg-emerald-900 text-white px-2 py-0.5 md:px-4 md:py-1 rounded-lg text-[10px] md:text-sm font-black border border-emerald-500">${cfg.q}</span></div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead><tr class="text-slate-400 border-b border-white/10 text-[10px] md:text-sm font-black uppercase"><th class="py-2 md:py-3 pl-2 md:pl-4">隊名</th><th class="py-2 text-right">勝</th><th class="py-2 text-right pr-2 md:pr-4">分</th></tr></thead>
                            <tbody>
                            ${groupData.list.map((d,i) => {
                                const isQualified = i < cfg.top;
                                let rankTag = ""; let specialStyle = "";
                                if (groupData.allFinished) {
                                    if (cfg.k === "男雙M") {
                                        if (i === 0) { rankTag = ` 🏆`; specialStyle = "winner-glow"; }
                                        else if (i === 1) { rankTag = ` 🥈`; specialStyle = "runner-up-glow"; }
                                    } else {
                                        if (i === 0) rankTag = `<span class="ml-2 text-emerald-400 text-[10px]">● 1</span>`;
                                        else if (i === 1 && cfg.top >= 2) rankTag = `<span class="ml-2 text-slate-400 text-[10px]">● 2</span>`;
                                    }
                                }
                                return `<tr class="border-b border-white/5 ${groupData.allFinished && !isQualified ? 'opacity-30' : ''} ${isQualified ? 'qualified-row' : ''}">
                                    <td class="py-3 md:py-6 font-black text-sm md:text-2xl pl-2 md:pl-4">
                                        <div class="flex items-center ${specialStyle}">
                                            <span class="text-emerald-400 mr-2 text-[10px]">[${d.code}]</span>
                                            <span class="truncate max-w-[120px] md:max-w-none">${d.name}</span>${rankTag}
                                        </div>
                                    </td>
                                    <td class="text-right font-black text-lg md:text-3xl text-emerald-400">${d.win}</td>
                                    <td class="text-right pr-2 md:pr-4 font-black text-sm md:text-2xl text-slate-200">${d.pts}</td>
                                </tr>`;
                            }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            }).join('');
        }

        function buildSymmetricBox(m, label, boxType, defaultA, defaultB) {
            const isF = boxType === "final", isT = boxType === "third", isFinished = m.status === '已結束';
            let fA = (m.teamA && !m.teamA.match(/TBD|勝方|敗方|名|組/)) ? m.teamA : defaultA;
            let fB = (m.teamB && !m.teamB.match(/TBD|勝方|敗方|名|組/)) ? m.teamB : defaultB;
            let tagA = "", tagB = "";
            if (isFinished) {
                if (m.scoreA > m.scoreB) { tagA = isF ? " 🏆" : (isT ? " 🥉" : ""); tagB = isF ? " 🥈" : ""; }
                else if (m.scoreB > m.scoreA) { tagB = isF ? " 🏆" : (isT ? " 🥉" : ""); tagA = isF ? " 🥈" : ""; }
            }
            const winStyle = "text-2xl md:text-7xl final-winner-style";
            return `<div class="w-full max-w-[450px] rounded-2xl md:rounded-[3rem] p-4 md:p-10 border-2 md:border-4 shadow-xl ${isF ? 'final-gold' : (isT ? 'third-box' : 'sf-box')} ${m.status === '進行中' ? (isF ? 'status-live-final' : 'status-live') : ''}">
                <div class="flex justify-between items-center mb-4 md:mb-8"><span class="text-[10px] md:text-sm font-black bg-black/40 px-2 md:px-4 py-1 md:py-2 rounded-lg uppercase tracking-widest border border-white/10">${label}</span><span class="info-tag-court">${m.court}</span></div>
                <div class="space-y-4 md:space-y-8">
                    <div class="flex justify-between items-center gap-2"><div class="font-black truncate flex-1 text-sm md:text-3xl ${isF && isFinished && m.scoreA > m.scoreB ? winStyle : ''}">${fA}${tagA}</div><div class="text-xl md:text-5xl font-black score-display">${m.scoreA}</div></div>
                    <div class="flex justify-between items-center gap-2"><div class="font-black truncate flex-1 text-sm md:text-3xl ${isF && isFinished && m.scoreB > m.scoreA ? winStyle : ''}">${fB}${tagB}</div><div class="text-xl md:text-5xl font-black score-display">${m.scoreB}</div></div>
                </div>
                <div class="mt-4 md:mt-8 text-center border-t border-white/10 pt-2 md:pt-4 text-[10px] md:text-[16px] font-black opacity-80">${m.status} | ${m.id}</div>
            </div>`;
        }

        function renderBracketFlow() {
            const container = document.getElementById('page-bracket'); container.innerHTML = "";
            ["女雙", "混雙"].forEach(cat => {
                const getWinnerName = (k, idx, def) => (groupWinners[k] && groupWinners[k].list[idx]) ? groupWinners[k].list[idx].name : def;
                let s1A = getWinnerName(cat+"A", 0, "A組 1"), s1B = (cat === "女雙") ? getWinnerName("女雙B", 1, "B組 2") : getWinnerName("混雙B", 0, "B組 1");
                let s2A = (cat === "女雙") ? getWinnerName("女雙B", 0, "B組 1") : getWinnerName("混雙A", 1, "A組 2"), s2B = (cat === "女雙") ? getWinnerName("女雙A", 1, "A組 2") : getWinnerName("混雙C", 0, "C組 1");
                const getM = (idTag) => allData.find(m => m.type.includes(cat) && m.id.includes(idTag)) || {id:cat+idTag,teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽",court:"待定"};
                container.innerHTML += `<div class="flex flex-col items-center w-full px-2"><h2 class="text-4xl md:text-9xl font-black italic mb-6 md:mb-16 opacity-10 uppercase tracking-tighter text-white">${cat}</h2>
                    <div class="flex flex-col lg:grid lg:grid-cols-3 gap-6 md:gap-12 items-center justify-center w-full max-w-7xl">
                        <div class="w-full flex flex-col gap-4">${buildSymmetricBox(getM("四強1"), `準決賽 1`, "sf", s1A, s1B)}</div>
                        <div class="w-full flex flex-col gap-4 md:gap-16 items-center py-4 md:py-12 border-y-2 md:border-y-0 md:border-x-4 border-white/5">
                            ${buildSymmetricBox(getM("冠亞"), `👑 冠亞賽`, "final", "SF1 勝方", "SF2 勝方")}
                            ${buildSymmetricBox(getM("季殿"), `🥉 季殿賽`, "third", "SF1 敗方", "SF2 敗方")}
                        </div>
                        <div class="w-full flex flex-col gap-4">${buildSymmetricBox(getM("四強2"), `準決賽 2`, "sf", s2A, s2B)}</div>
                    </div></div>`;
            });
        }

        function showPage(p) {
            ['matches', 'standing', 'bracket'].forEach(id => {
                const s = document.getElementById(`page-${id}`); const b = document.getElementById(`btn-${id}`);
                if(s) s.classList.add('hidden'); if(b) b.classList.remove('tab-active');
            });
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.getElementById(`btn-${p}`).classList.add('tab-active');
            window.scrollTo({top:0, behavior:'smooth'});
        }
        loadData(); setInterval(loadData, 10000);
    </script>
</body>
</html>
