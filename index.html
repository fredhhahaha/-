<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - LIVE 看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        
        .tab-active { background-color: #10b981 !important; color: white !important; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        @media (max-width: 768px) { .desktop-view { display: none !important; } .mobile-view { display: block !important; } }
        @media (min-width: 769px) { .desktop-view { display: block !important; } .mobile-view { display: none !important; } }

        /* 特效區 */
        @keyframes gold-fire {
            0%, 100% { border-color: #fbbf24; box-shadow: 0 0 25px rgba(251, 191, 36, 0.5); transform: scale(1.02); }
            50% { border-color: #f59e0b; box-shadow: 0 0 50px rgba(245, 158, 11, 0.7); transform: scale(1.03); }
        }
        .final-gold { animation: gold-fire 1.5s infinite; border-width: 4px !important; background: linear-gradient(145deg, #0f172a, #1e293b) !important; }

        @keyframes orange-laser {
            0%, 100% { border-color: #f97316; box-shadow: 0 0 15px rgba(249, 115, 22, 0.3); }
            50% { border-color: #fdba74; box-shadow: 0 0 25px rgba(253, 186, 116, 0.5); }
        }
        .third-place-orange { animation: orange-laser 2s infinite; border-width: 3px !important; }

        .match-banner {
            background: linear-gradient(90deg, rgba(2,6,23,1) 0%, rgba(30,41,59,0.4) 50%, rgba(2,6,23,1) 100%);
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body class="pb-10">

    <header class="bg-slate-950 py-10 text-center border-b border-white/5">
        <h1 class="text-5xl font-black italic text-emerald-400 tracking-tighter uppercase">🍲 砂鍋盃 LIVE</h1>
        <div class="mt-3 text-[10px] text-slate-500 font-bold tracking-[0.5em]">ECO POT LIVE</div>
    </header>

    <nav class="max-w-xl mx-auto px-4 -mt-7 sticky top-4 z-50">
        <div class="flex bg-slate-900/90 backdrop-blur-md rounded-2xl p-1.5 border border-white/10 shadow-2xl">
            <button onclick="showPage('matches')" id="btn-matches" class="flex-1 py-4 text-sm font-black rounded-xl tab-active transition-all">賽程看板</button>
            <button onclick="showPage('standing')" id="btn-standing" class="flex-1 py-4 text-sm font-black rounded-xl text-slate-400 transition-all">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="flex-1 py-4 text-sm font-black rounded-xl text-slate-400 transition-all">晉級之路</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 mt-8">
        <div id="loading-msg" class="text-center py-20 text-emerald-500 font-bold animate-pulse text-lg">📡 正在同步即時數據...</div>
        
        <section id="page-matches" class="hidden space-y-5"></section>
        
        <section id="page-standing" class="hidden grid grid-cols-1 md:grid-cols-2 gap-8"></section>
        
        <section id="page-bracket" class="hidden w-full overflow-x-auto no-scrollbar rounded-[3rem] p-4 md:p-12 bg-slate-950/40 border border-white/5 shadow-2xl">
            <div id="bracket-flow" class="min-w-[1100px] mx-auto space-y-32"></div>
        </section>
    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        let allData = [];
        let groupWinners = {};

        async function loadData() {
            try {
                const r = await fetch(sheetUrl);
                const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: String(r.c[0]?.v || "").toUpperCase().trim(),
                    time: r.c[1]?.v || "", court: r.c[2]?.v || "",
                    type: String(r.c[3]?.v || ""),
                    teamA: String(r.c[4]?.v || "TBD").trim(), teamB: String(r.c[5]?.v || "TBD").trim(),
                    scoreA: Number(r.c[6]?.v || 0), scoreB: Number(r.c[7]?.v || 0),
                    ref: r.c[8]?.v || "", status: String(r.c[9]?.v || "待賽").trim()
                }));
                document.getElementById('loading-msg').classList.add('hidden');
                renderAll();
            } catch(e) { console.error(e); }
        }

        function renderAll() {
            renderMatches();
            renderStandings(); 
            renderBracketFlow();
        }

        function renderMatches() {
            const container = document.getElementById('page-matches');
            container.innerHTML = allData.map(m => {
                const isLive = m.status === '進行中';
                return `
                <div class="desktop-view match-banner p-8 rounded-[2.5rem] relative group transition-all">
                    <div class="flex items-center justify-between relative z-10">
                        <div class="w-2/5 text-right">
                            <div class="text-xs text-emerald-500 font-black mb-1">#${m.id}</div>
                            <div class="text-3xl font-black text-white truncate">${m.teamA}</div>
                        </div>
                        <div class="flex flex-col items-center px-12">
                            <div class="text-5xl font-black italic text-emerald-400 tabular-nums">${m.scoreA} : ${m.scoreB}</div>
                            <div class="mt-4 flex flex-col items-center">
                                <span class="px-4 py-0.5 rounded-full text-[10px] font-black ${isLive?'bg-orange-500 text-white animate-pulse':'bg-slate-800 text-slate-500'}">${m.status}</span>
                                <div class="text-[10px] text-slate-500 font-bold mt-3 flex gap-5">
                                    <span>🕒 ${m.time}</span><span>📍 ${m.court}</span><span>👤 裁判: ${m.ref}</span>
                                </div>
                            </div>
                        </div>
                        <div class="w-2/5 text-left">
                            <div class="text-xs text-slate-500 font-black mb-1">${m.type}</div>
                            <div class="text-3xl font-black text-white truncate">${m.teamB}</div>
                        </div>
                    </div>
                </div>
                <div class="mobile-view p-5 rounded-2xl bg-slate-900 border border-white/5 shadow-lg">
                    <div class="flex justify-between text-[10px] font-black text-slate-500 mb-3">
                        <span class="text-emerald-500">#${m.id}</span><span>${m.type} | ${m.court}</span>
                    </div>
                    <div class="flex items-center justify-between font-black text-white">
                        <span class="flex-1 truncate">${m.teamA}</span>
                        <span class="px-4 text-2xl italic text-emerald-400 font-black">${m.scoreA}:${m.scoreB}</span>
                        <span class="flex-1 text-right truncate">${m.teamB}</span>
                    </div>
                    <div class="mt-4 text-[9px] text-slate-500 flex justify-between border-t border-white/5 pt-3">
                        <span>裁判: ${m.ref} | ${m.time}</span><span class="${isLive?'text-orange-500 animate-pulse':''}">${m.status}</span>
                    </div>
                </div>`;
            }).join('');
        }

        function renderStandings() {
            const container = document.getElementById('page-standing');
            const configs = [
                { title: "男雙", type: "男雙", sub: "M", top: 2 },
                { title: "女雙 A", type: "女雙", sub: "A", top: 2 },
                { title: "女雙 B", type: "女雙", sub: "B", top: 2 },
                { title: "混雙 A", type: "混雙", sub: "A", top: 2 },
                { title: "混雙 B", type: "混雙", sub: "B", top: 1 },
                { title: "混雙 C", type: "混雙", sub: "C", top: 1 }
            ];
            groupWinners = {};
            container.innerHTML = configs.map(cfg => {
                const stats = {};
                const groupMatches = allData.filter(m => m.type.includes(cfg.type) && m.id.startsWith(cfg.sub) && !m.type.match(/四強|決賽|季殿/));
                groupMatches.forEach(m => {
                    if(m.teamA && m.teamA !== 'TBD' && !stats[m.teamA]) stats[m.teamA] = { name: m.teamA, win: 0, score: 0 };
                    if(m.teamB && m.teamB !== 'TBD' && !stats[m.teamB]) stats[m.teamB] = { name: m.teamB, win: 0, score: 0 };
                    if(m.status === "已結束") {
                        stats[m.teamA].score += m.scoreA; stats[m.teamB].score += m.scoreB;
                        if(m.scoreA > m.scoreB) stats[m.teamA].win++; else if(m.scoreB > m.scoreA) stats[m.teamB].win++;
                    }
                });
                const sorted = Object.values(stats).sort((a, b) => (b.win !== a.win) ? (b.win - a.win) : (b.score - a.score));
                groupWinners[cfg.type + cfg.sub] = sorted.map(d => d.name);
                if (sorted.length === 0) return "";
                
                return `<div class="bg-slate-900 rounded-3xl p-6 border border-white/5 shadow-2xl">
                    <div class="mb-6 font-black italic text-emerald-400 text-xl flex justify-between items-center">
                        <span>🏆 ${cfg.title}</span>
                        <span class="text-[9px] text-slate-500 uppercase tracking-widest font-normal">Rankings</span>
                    </div>
                    <table class="w-full text-sm">
                        <tr class="text-[9px] text-slate-600 font-bold border-b border-white/5 uppercase">
                            <td class="pb-2">球員名稱</td><td class="pb-2 text-right">勝場 (W)</td><td class="pb-2 text-right">勝分 (PTS)</td>
                        </tr>
                        ${sorted.map((d, i) => `
                            <tr class="border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors group">
                                <td class="py-4 font-bold text-white">${d.name}</td>
                                <td class="py-4 text-right font-black text-emerald-400 group-hover:scale-110 transition-transform">${d.win} <span class="text-[9px] text-slate-500 font-normal">W</span></td>
                                <td class="py-4 text-right text-slate-400 italic">${d.score} <span class="text-[9px] text-slate-600 font-normal">PTS</span></td>
                            </tr>
                        `).join('')}
                    </table>
                </div>`;
            }).join('');
        }

        function buildNode(m, label, type, curA, curB) {
            const isFinal = type === "final";
            const isThird = type === "third";
            const fA = /組|第一|第二|勝者|敗者/.test(m.teamA) || m.teamA === "TBD" ? curA : m.teamA;
            const fB = /組|第一|第二|勝者|敗者/.test(m.teamB) || m.teamB === "TBD" ? curB : m.teamB;
            let effect = isFinal ? "final-gold" : (isThird ? "third-place-orange" : "border-white/5 bg-slate-900/50");

            return `<div class="bracket-node rounded-[2.5rem] p-8 border-2 transition-all ${effect}">
                <div class="text-[10px] font-black mb-5 flex justify-between text-slate-500">
                    <span>${label}</span><span class="${m.status === '進行中' ? 'text-orange-500 animate-pulse' : ''}">${m.status}</span>
                </div>
                <div class="space-y-6 font-black text-2xl text-white">
                    <div class="flex justify-between items-center">
                        <span class="truncate w-44">${fA}</span>
                        <span class="text-emerald-400 ml-4 tabular-nums">${m.scoreA}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="truncate w-44">${fB}</span>
                        <span class="text-emerald-400 ml-4 tabular-nums">${m.scoreB}</span>
                    </div>
                </div>
            </div>`;
        }

        function renderBracketFlow() {
            const flow = document.getElementById('bracket-flow'); flow.innerHTML = "";
            ["女雙", "混雙"].forEach(cat => {
                let s1A, s1B, s2A, s2B;
                if (cat === "女雙") {
                    s1A = groupWinners["女雙A"]?.[0] || 'A組第一'; s1B = groupWinners["女雙B"]?.[1] || 'B組第二';
                    s2A = groupWinners["女雙B"]?.[0] || 'B組第一'; s2B = groupWinners["女雙A"]?.[1] || 'A組第二';
                } else {
                    s1A = groupWinners["混雙A"]?.[0] || 'A組第一'; s1B = groupWinners["混雙B"]?.[0] || 'B組第一';
                    s2A = groupWinners["混雙A"]?.[1] || 'A組第二'; s2B = groupWinners["混雙C"]?.[0] || 'C組第一';
                }
                const s1 = allData.find(m => m.type.includes(cat) && m.type.match(/四強|SF/i) && m.id.includes("1")) || {scoreA:0, scoreB:0, status:"待賽"};
                const s2 = allData.find(m => m.type.includes(cat) && m.type.match(/四強|SF/i) && m.id.includes("2")) || {scoreA:0, scoreB:0, status:"待賽"};
                const f = allData.find(m => m.type.includes(cat) && m.type.match(/決賽/i) && !m.type.includes("季殿")) || {scoreA:0, scoreB:0, status:"待賽"};
                const t = allData.find(m => m.type.includes(cat) && m.type.match(/季殿/)) || {scoreA:0, scoreB:0, status:"待賽"};
                let l1 = s1.status === "已結束" ? (s1.scoreA > s1.scoreB ? s1.teamB : s1.teamA) : "敗者 1";
                let l2 = s2.status === "已結束" ? (s2.scoreA > s2.scoreB ? s2.teamB : s2.teamA) : "敗者 2";

                flow.innerHTML += `<div class="py-8 border-b border-white/5 last:border-0">
                    <h3 class="text-center font-black text-4xl text-white mb-20 italic uppercase tracking-tighter opacity-80">${cat} Finals Road</h3>
                    <div class="flex items-center justify-center gap-10">
                        <div class="w-96 space-y-24">${buildNode(s1, "Semi-Final 1", "normal", s1A, s1B)}${buildNode(s2, "Semi-Final 2", "normal", s2A, s2B)}</div>
                        <div class="h-1 w-20 bg-slate-800/40"></div>
                        <div class="w-[32rem] space-y-16">
                            ${buildNode(f, "👑 Championship (冠亞軍賽)", "final", "勝者 1", "勝者 2")}
                            ${buildNode(t, "🥉 3rd Place Match (季殿軍賽)", "third", l1, l2)}
                        </div>
                    </div>
                </div>`;
            });
        }

        function showPage(p) {
            ['matches', 'standing', 'bracket'].forEach(id => {
                document.getElementById(`page-${id}`).classList.add('hidden');
                document.getElementById(`btn-${id}`).classList.remove('tab-active', 'text-slate-400');
            });
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.getElementById(`btn-${p}`).classList.add('tab-active');
            window.scrollTo(0,0);
        }

        loadData(); setInterval(loadData, 15000);
    </script>
</body>
</html>
