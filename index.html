<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - LIVE 看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #010409; color: #f8fafc; }
        .tab-active { background-color: #10b981 !important; color: white !important; transform: translateY(-4px); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.5); }
        
        /* 特效 1：冠軍賽 (金紅閃爍) */
        @keyframes final-glow {
            0%, 100% { border-color: #fbbf24; box-shadow: 0 0 15px #fbbf24; }
            50% { border-color: #ff0000; box-shadow: 0 0 40px #ff0000; }
        }
        .status-live-final { animation: final-glow 0.6s infinite ease-in-out !important; border-width: 6px !important; }

        /* 特效 2：季軍賽 (橘紅閃爍) */
        @keyframes third-glow {
            0%, 100% { border-color: #9a3412; }
            50% { border-color: #f97316; box-shadow: 0 0 25px #f97316; }
        }
        .status-live-third { animation: third-glow 0.8s infinite ease-in-out !important; border-width: 5px !important; }

        /* 特效 3：一般/四強賽 (綠色呼吸) */
        @keyframes live-glow { 0%, 100% { border-color: #1e293b; } 50% { border-color: #10b981; } }
        .status-live { animation: live-glow 1.2s infinite; border-width: 4px !important; }

        .final-gold { background: linear-gradient(135deg, #f59e0b, #fbbf24) !important; color: #451a03 !important; }
        .sf-box { background-color: #1e1b4b !important; border: 2px solid #4338ca; }
        .third-box { background-color: #431407 !important; border: 2px solid #9a3412; }
        .qualified-row { border-left: 8px solid #10b981 !important; background: rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="pb-24">

    <header class="bg-black py-6 text-center border-b-2 border-emerald-500">
        <h1 class="text-5xl md:text-7xl font-black italic text-white tracking-tighter uppercase">🍲 生態砂鍋盃 
        </h1> <div class="mt-3 text-[10px] text-slate-500 font-bold tracking-[0.5em]">ECO POT LIVE</div>
    </header>

    <nav class="fixed bottom-4 left-0 right-0 md:sticky md:top-4 z-[100] max-w-lg mx-auto px-4">
        <div class="flex bg-slate-900/95 backdrop-blur rounded-2xl p-1 border border-white/10 shadow-2xl">
            <button onclick="showPage('matches')" id="btn-matches" class="flex-1 py-3 text-xs font-black rounded-xl text-slate-400">賽程看板</button>
            <button onclick="showPage('standing')" id="btn-standing" class="flex-1 py-3 text-xs font-black rounded-xl text-slate-400">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="flex-1 py-3 text-xs font-black rounded-xl text-slate-400">晉級之路</button>
        </div>
    </nav>

    <main class="w-full max-w-6xl mx-auto p-4 mt-4">
        <div id="loading-msg" class="text-center py-20 text-emerald-500 font-bold animate-pulse">📡 正在同步資料庫...</div>
        <section id="page-matches" class="hidden space-y-4"></section>
        <section id="page-standing" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6"></section>
        <section id="page-bracket" class="hidden space-y-16"></section>
    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        let allData = []; let groupWinners = {}; let isFirstLoad = true;

        async function loadData() {
            try {
                const r = await fetch(sheetUrl); const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: String(r.c[0]?.v || "").trim(),
                    time: r.c[1]?.v || "", court: r.c[2]?.v || "", type: String(r.c[3]?.v || "").trim(),
                    teamA: String(r.c[4]?.v || "TBD").trim(), teamB: String(r.c[5]?.v || "TBD").trim(),
                    scoreA: Number(r.c[6]?.v || 0), scoreB: Number(r.c[7]?.v || 0),
                    ref: String(r.c[8]?.v || "待定").trim(), status: String(r.c[9]?.v || "待賽").trim()
                }));
                document.getElementById('loading-msg').classList.add('hidden');
                renderAll();
                if(isFirstLoad) { showPage('matches'); isFirstLoad = false; }
            } catch(e) { console.error(e); }
        }

        function renderAll() { renderMatches(); renderStandings(); renderBracketFlow(); }

        // PAGE 1: 修正閃爍邏輯 & 完整隊名
        function renderMatches() {
            const container = document.getElementById('page-matches');
            container.innerHTML = allData.map(m => {
                const isLive = m.status === '進行中';
                const isFinal = m.id.includes('冠亞') || m.id.includes('決賽');
                const isThird = m.id.includes('季殿');
                let theme = 'bg-emerald-600'; if(m.type.includes('女雙')) theme = 'bg-purple-600'; if(m.type.includes('混雙')) theme = 'bg-orange-600';
                
                let liveClass = "border-white/5"; // 預設靜止
                if(isLive) {
                    if(isFinal) liveClass = "status-live-final";
                    else if(isThird) liveClass = "status-live-third";
                    else liveClass = "status-live";
                }
                
                return `<div class="relative bg-slate-900 p-5 md:p-8 rounded-[2rem] flex flex-col md:flex-row items-center border-l-[10px] transition-all ${liveClass}">
                    <div class="absolute -top-2 left-8 ${theme} text-white px-3 py-0.5 rounded-full text-[9px] font-black z-10">${m.type}</div>
                    <div class="flex-1 text-center md:text-right text-xl md:text-2xl font-black text-white px-2 break-words w-full">${m.teamA}</div>
                    <div class="flex flex-col items-center justify-center min-w-[120px] md:min-w-[200px] my-3 md:my-0">
                        <div class="text-[9px] font-bold text-slate-500 mb-1">${m.id}</div>
                        <div class="text-5xl md:text-6xl font-black italic tabular-nums text-emerald-400">${m.scoreA}:${m.scoreB}</div>
                        <div class="mt-2 text-center">
                             <div class="text-[9px] text-slate-400 font-bold uppercase tracking-tighter">📍 ${m.court} | ⚖️ ${m.ref}</div>
                             <div class="mt-1"><span class="${isLive ? 'bg-red-600 text-white px-3 py-0.5 rounded-full text-[9px] animate-pulse font-black' : 'text-slate-600 text-[9px] font-bold'}">${m.status}</span></div>
                        </div>
                    </div>
                    <div class="flex-1 text-center md:text-left text-xl md:text-2xl font-black text-white px-2 break-words w-full">${m.teamB}</div>
                </div>`;
            }).join('');
        }

        // PAGE 2: 顯示晉級名額
        function renderStandings() {
            const container = document.getElementById('page-standing');
            const configs = [
                {title:"男雙組",type:"男雙",sub:"M",top:2,quota:"取前 2 名"},
                {title:"女雙 A 組",type:"女雙",sub:"A",top:2,quota:"取前 2 名"},
                {title:"女雙 B 組",type:"女雙",sub:"B",top:2,quota:"取前 2 名"},
                {title:"混雙 A 組",type:"混雙",sub:"A",top:2,quota:"取前 2 名"},
                {title:"混雙 B 組",type:"混雙",sub:"B",top:1,quota:"取前 1 名"},
                {title:"混雙 C 組",type:"混雙",sub:"C",top:1,quota:"取前 1 名"}
            ];
            groupWinners = {};
            container.innerHTML = configs.map(cfg => {
                const stats = {};
                const matches = allData.filter(m => m.type.includes(cfg.type) && m.id.startsWith(cfg.sub) && !m.id.match(/四強|冠亞|決賽|季殿/));
                matches.forEach(m => {
                    [ {n: m.teamA, s: m.scoreA}, {n: m.teamB, s: m.scoreB} ].forEach(t => {
                        if(t.n && t.n !== 'TBD') {
                            if(!stats[t.n]) stats[t.n] = { name: t.n, win: 0, pts: 0 };
                            if(m.status === "已結束") {
                                stats[t.n].pts += t.s;
                                if(t.s > (t.n === m.teamA ? m.scoreB : m.scoreA)) stats[t.n].win++;
                            }
                        }
                    });
                });
                const sorted = Object.values(stats).sort((a,b) => (b.win-a.win) || (b.pts-a.pts));
                groupWinners[cfg.type + cfg.sub] = sorted.map(d => d.name);
                if (sorted.length === 0) return "";
                return `<div class="bg-slate-900 rounded-[1.5rem] p-5 border border-white/5 shadow-xl">
                    <div class="flex justify-between items-end mb-4">
                        <h3 class="text-lg font-black text-emerald-400 italic">${cfg.title}</h3>
                        <span class="text-[10px] bg-emerald-900/50 text-emerald-300 px-2 py-0.5 rounded-md font-bold">${cfg.quota}</span>
                    </div>
                    <table class="w-full text-sm">
                        <tr class="text-slate-500 border-b border-white/10 text-xs">
                            <th class="text-left py-2 font-bold pl-2">隊名</th>
                            <th class="text-right py-2 font-bold">勝場</th>
                            <th class="text-right py-2 font-bold pr-2">總分</th>
                        </tr>
                        ${sorted.map((d,i) => `<tr class="border-b border-white/5 ${i < cfg.top ? 'qualified-row' : 'opacity-30'}"><td class="py-3 font-bold pl-2 truncate max-w-[150px]">${d.name}</td><td class="text-right font-black text-emerald-500">${d.win}</td><td class="text-right text-slate-500 pr-2 font-bold">${d.pts}</td></tr>`).join('')}
                    </table>
                </div>`;
            }).join('');
        }

        // PAGE 3: 方塊防溢位 & 強制連動
        function buildSymmetricBox(m, label, boxType, curA, curB) {
            const isF = boxType === "final", isT = boxType === "third", isLive = m.status === '進行中', isFinished = m.status === '已結束';
            let fA = (m.teamA && m.teamA !== "TBD" && !m.teamA.match(/勝方|敗方|名/)) ? m.teamA : curA;
            let fB = (m.teamB && m.teamB !== "TBD" && !m.teamB.match(/勝方|敗方|名/)) ? m.teamB : curB;

            let tagA = "", tagB = "";
            if(isFinished) {
                if(m.scoreA > m.scoreB) tagA = isF ? `<span class="ml-1 bg-white text-black px-1.5 py-0.5 rounded text-[8px] animate-bounce">🏆 冠軍</span>` : (isT ? `<span class="ml-1 bg-orange-200 text-orange-900 px-1.5 py-0.5 rounded text-[8px]">🥉 季軍</span>` : "");
                else if(m.scoreB > m.scoreA) tagB = isF ? `<span class="ml-1 bg-white text-black px-1.5 py-0.5 rounded text-[8px] animate-bounce">🏆 冠軍</span>` : (isT ? `<span class="ml-1 bg-orange-200 text-orange-900 px-1.5 py-0.5 rounded text-[8px]">🥉 季軍</span>` : "");
            }

            let liveClass = "";
            if(isLive) {
                if(isF) liveClass = "status-live-final";
                else if(isT) liveClass = "status-live-third";
                else liveClass = "status-live";
            }
            let styleClass = isF ? "final-gold" : (isT ? "third-box" : "sf-box");
            
            return `<div class="w-full max-w-[380px] h-auto min-h-[160px] rounded-[2rem] p-6 border-4 shadow-2xl transition-all ${styleClass} ${liveClass}">
                <div class="text-[9px] font-black mb-3 flex justify-between uppercase opacity-60"><span>${label}</span><span>${m.status}</span></div>
                <div class="flex flex-col gap-4 font-black text-lg md:text-xl leading-tight">
                    <div class="flex justify-between items-start gap-2">
                        <div class="flex-1 break-words">${fA}${tagA}</div>
                        <div class="text-2xl">${m.scoreA}</div>
                    </div>
                    <div class="flex justify-between items-start gap-2">
                        <div class="flex-1 break-words">${fB}${tagB}</div>
                        <div class="text-2xl">${m.scoreB}</div>
                    </div>
                </div>
            </div>`;
        }

        function renderBracketFlow() {
            const container = document.getElementById('page-bracket'); container.innerHTML = "";
            ["女雙", "混雙"].forEach(cat => {
                const prefix = cat[0]; 
                
                // 1. 積分預選
                let s1A = groupWinners[cat + "A"]?.[0] || 'A組1';
                let s1B = (cat === "女雙") ? (groupWinners["女雙B"]?.[1] || 'B組2') : (groupWinners["混雙B"]?.[0] || 'B組1');
                let s2A = (cat === "女雙") ? (groupWinners["女雙B"]?.[0] || 'B組1') : (groupWinners["混雙A"]?.[1] || 'A組2');
                let s2B = (cat === "女雙") ? (groupWinners["女雙A"]?.[1] || 'A組2') : (groupWinners["混雙C"]?.[0] || 'C組1');
                
                // 2. 搜尋實時場次 (精準匹配 ID 包含 類別+四強+1/2)
                const s1 = allData.find(m => m.id.indexOf(prefix) !== -1 && m.id.indexOf('四強') !== -1 && m.id.indexOf('1') !== -1) || {id:cat+"四強1",teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};
                const s2 = allData.find(m => m.id.indexOf(prefix) !== -1 && m.id.indexOf('四強') !== -1 && m.id.indexOf('2') !== -1) || {id:cat+"四強2",teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};
                const f = allData.find(m => m.id.indexOf(prefix) !== -1 && (m.id.indexOf('冠亞') !== -1 || m.id.indexOf('決賽') !== -1)) || {id:cat+"冠亞賽",teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};
                const t = allData.find(m => m.id.indexOf(prefix) !== -1 && m.id.indexOf('季殿') !== -1) || {id:cat+"季殿賽",teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽"};

                // 3. 強制勝負判定
                let win1 = "四強1 勝方", lose1 = "四強1 敗方", win2 = "四強2 勝方", lose2 = "四強2 敗方";
                if(s1.status === "已結束") {
                    win1 = s1.scoreA > s1.scoreB ? s1.teamA : s1.teamB;
                    lose1 = s1.scoreA > s1.scoreB ? s1.teamB : s1.teamA;
                }
                if(s2.status === "已結束") {
                    win2 = s2.scoreA > s2.scoreB ? s2.teamA : s2.teamB;
                    lose2 = s2.scoreA > s2.scoreB ? s2.teamB : s2.teamA;
                }

                container.innerHTML += `
                <div class="flex flex-col items-center w-full px-2">
                    <h2 class="text-4xl md:text-6xl font-black italic mb-10 opacity-30 uppercase tracking-widest">${cat} FINALS</h2>
                    <div class="flex flex-col lg:flex-row items-center justify-center gap-6 w-full">
                        <div class="w-full flex justify-center">${buildSymmetricBox(s1, `${cat} 準決賽 1`, "sf", s1A, s1B)}</div>
                        <div class="flex flex-col gap-6 w-full items-center">
                            ${buildSymmetricBox(f, `👑 ${cat} 冠軍賽`, "final", win1, win2)}
                            ${buildSymmetricBox(t, `🥉 ${cat} 季殿賽`, "third", lose1, lose2)}
                        </div>
                        <div class="w-full flex justify-center">${buildSymmetricBox(s2, `${cat} 準決賽 2`, "sf", s2A, s2B)}</div>
                    </div>
                </div>`;
            });
        }

        function showPage(p) {
            ['matches', 'standing', 'bracket'].forEach(id => {
                const s = document.getElementById(`page-${id}`); const b = document.getElementById(`btn-${id}`);
                if(s) s.classList.add('hidden'); if(b) b.classList.remove('tab-active');
            });
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.getElementById(`btn-${p}`).classList.add('tab-active');
            window.scrollTo(0,0);
        }
        loadData(); setInterval(loadData, 10000);
    </script>
</body>
</html>
