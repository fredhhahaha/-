<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生態砂鍋盃 - LIVE 看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #010409; color: #f8fafc; }
        .tab-active { background-color: #10b981 !important; color: white !important; transform: translateY(-4px); box-shadow: 0 10px 25px rgba(16, 185, 129, 0.5); }
        
        @keyframes final-super-glow {
            0%, 100% { border-color: #fbbf24; box-shadow: 0 0 20px #fbbf24, inset 0 0 10px #fbbf24; }
            50% { border-color: #ff0000; box-shadow: 0 0 60px #ff0000, inset 0 0 20px #ff0000; filter: brightness(1.4); transform: scale(1.02); }
        }
        .status-live-final { animation: final-super-glow 0.5s infinite ease-in-out !important; border-width: 8px !important; }

        @keyframes third-super-glow {
            0%, 100% { border-color: #9a3412; box-shadow: 0 0 15px #9a3412; }
            50% { border-color: #f97316; box-shadow: 0 0 40px #f97316; filter: brightness(1.2); }
        }
        .status-live-third { animation: third-super-glow 0.8s infinite ease-in-out !important; border-width: 6px !important; }

        @keyframes live-glow { 0%, 100% { border-color: #1e293b; } 50% { border-color: #10b981; } }
        .status-live { animation: live-glow 1.2s infinite; border-width: 4px !important; }

        .final-gold { background: linear-gradient(135deg, #f59e0b, #fbbf24) !important; color: #451a03 !important; }
        .sf-box { background-color: #1e1b4b !important; border: 3px solid #4338ca; }
        .third-box { background-color: #431407 !important; border: 3px solid #9a3412; }
        .qualified-row { border-left: 10px solid #10b981 !important; background: rgba(16, 185, 129, 0.1); }
        
        .info-tag-court { background-color: #065f46; color: #34d399; padding: 2px 10px; border-radius: 6px; font-weight: 900; font-size: 12px; }
        .info-tag-ref { background-color: #1e3a8a; color: #93c5fd; padding: 2px 10px; border-radius: 6px; font-weight: 900; font-size: 12px; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-black py-8 text-center border-b-4 border-emerald-500 shadow-2xl">
        <h1 class="text-5xl md:text-7xl font-black italic text-white tracking-tighter uppercase">🍲 生態砂鍋盃 
        </h1> <div class="mt-3 text-[10px] text-slate-500 font-bold tracking-[0.5em]">ECO POT LIVE</div>
    </header>

    <nav class="fixed bottom-4 left-0 right-0 md:sticky md:top-4 z-[100] max-w-lg mx-auto px-4">
        <div class="flex bg-slate-900/95 backdrop-blur rounded-2xl p-1.5 border border-white/20 shadow-2xl">
            <button onclick="showPage('matches')" id="btn-matches" class="flex-1 py-4 text-xs font-black rounded-xl text-slate-400">賽程看板</button>
            <button onclick="showPage('standing')" id="btn-standing" class="flex-1 py-4 text-xs font-black rounded-xl text-slate-400">分組積分</button>
            <button onclick="showPage('bracket')" id="btn-bracket" class="flex-1 py-4 text-xs font-black rounded-xl text-slate-400">晉級之路</button>
        </div>
    </nav>

    <main class="w-full max-w-7xl mx-auto p-4 mt-6">
        <div id="loading-msg" class="text-center py-20 text-emerald-500 font-black text-2xl animate-pulse">📡 同步最新戰況中...</div>
        <section id="page-matches" class="hidden space-y-6"></section>
        <section id="page-standing" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8"></section>
        <section id="page-bracket" class="hidden space-y-24"></section>
    </main>

    <script>
        const sheetId = '10ywzReTqHAeqN1YzQYZfBhebd1-59Yc79qz26y6O51o';
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
        let allData = []; let groupWinners = {}; let isFirstLoad = true;

        async function loadData() {
            try {
                const r = await fetch(sheetUrl); const t = await r.text();
                const j = JSON.parse(t.substring(47).slice(0, -2));
                allData = j.table.rows.map(r => ({
                    id: String(r.c[0]?.v || "").trim(),
                    time: r.c[1]?.v || "", court: r.c[2]?.v || "", type: String(r.c[3]?.v || "").trim(),
                    teamA: String(r.c[4]?.v || "TBD").trim(), teamB: String(r.c[5]?.v || "TBD").trim(),
                    scoreA: Number(r.c[6]?.v || 0), scoreB: Number(r.c[7]?.v || 0),
                    ref: String(r.c[8]?.v || "待定").trim(), status: String(r.c[9]?.v || "待賽").trim()
                }));
                document.getElementById('loading-msg').classList.add('hidden');
                calculateRankings();
                renderAll();
                if(isFirstLoad) { showPage('matches'); isFirstLoad = false; }
            } catch(e) { console.error(e); }
        }

        function calculateRankings() {
            const configs = [
                {k:"男雙M",t:"男雙",s:"M"}, {k:"女雙A",t:"女雙",s:"A"}, {k:"女雙B",t:"女雙",s:"B"},
                {k:"混雙A",t:"混雙",s:"A"}, {k:"混雙B",t:"混雙",s:"B"}, {k:"混雙C",t:"混雙",s:"C"}
            ];
            groupWinners = {};
            configs.forEach(cfg => {
                const stats = {};
                const groupMatches = allData.filter(m => m.type.includes(cfg.t) && m.id.startsWith(cfg.s) && !m.id.match(/四強|冠亞|決賽|季殿/));
                const allFinished = groupMatches.length > 0 && groupMatches.every(m => m.status === "已結束");
                
                groupMatches.forEach(m => {
                    const idA = m.id.split('-')[0]; const idB = m.id.split('-')[1];
                    [ {n: m.teamA, s: m.scoreA, op: m.scoreB, code: idA}, {n: m.teamB, s: m.scoreB, op: m.scoreA, code: idB} ].forEach(t => {
                        if(t.n && t.n !== 'TBD' && !t.n.includes('組')) {
                            if(!stats[t.n]) stats[t.n] = { name: t.n, win: 0, pts: 0, code: t.code };
                            if(m.status === "已結束") {
                                stats[t.n].pts += t.s;
                                if(t.s > t.op) stats[t.n].win++;
                            }
                        }
                    });
                });
                groupWinners[cfg.k] = { 
                    list: Object.values(stats).sort((a,b) => (b.win-a.win) || (b.pts-a.pts)),
                    allFinished: allFinished 
                };
            });
        }

        function renderAll() { renderMatches(); renderStandings(); renderBracketFlow(); }

        function renderMatches() {
            const container = document.getElementById('page-matches');
            container.innerHTML = allData.map(m => {
                const isLive = m.status === '進行中';
                const isFinal = m.id.includes('冠亞') || m.id.includes('決賽');
                const isThird = m.id.includes('季殿');
                const isSF = m.id.includes('四強');
                
                let displayA = m.teamA; let displayB = m.teamB;

                if (isSF) {
                    const cat = m.type.includes('女') ? '女雙' : '混雙';
                    const getW = (k, idx, def) => (groupWinners[k] && groupWinners[k].list[idx]) ? groupWinners[k].list[idx].name : def;
                    if (m.id.includes('四強1')) {
                        if (displayA.match(/TBD|組|勝方/)) displayA = getW(cat+"A", 0, "A組1");
                        if (displayB.match(/TBD|組|勝方/)) displayB = (cat === '女雙') ? getW("女雙B", 1, "B組2") : getW("混雙B", 0, "B組1");
                    } else if (m.id.includes('四強2')) {
                        if (displayA.match(/TBD|組|勝方/)) displayA = (cat === '女雙') ? getW("女雙B", 0, "B組1") : getW("混雙A", 1, "A組2");
                        if (displayB.match(/TBD|組|勝方/)) displayB = (cat === '女雙') ? getW("女雙A", 1, "A組2") : getW("混雙C", 0, "C組1");
                    }
                }

                let theme = 'bg-emerald-600'; if(m.type.includes('女雙')) theme = 'bg-purple-600'; if(m.type.includes('混雙')) theme = 'bg-orange-600';
                let liveClass = isLive ? (isFinal ? "status-live-final" : (isThird ? "status-live-third" : "status-live")) : "border-white/5";
                
                return `<div class="relative bg-slate-900 p-6 md:p-10 rounded-[2.5rem] flex flex-col md:flex-row items-center border-l-[12px] transition-all ${liveClass}">
                    <div class="absolute -top-3 left-10 ${theme} text-white px-4 py-1 rounded-full text-[10px] font-black z-10 shadow-lg">${m.type}</div>
                    <div class="flex-1 text-center md:text-right text-2xl md:text-3xl font-black text-white px-4 break-words w-full">${displayA}</div>
                    <div class="flex flex-col items-center justify-center min-w-[140px] md:min-w-[280px] my-6 md:my-0">
                        <div class="flex gap-2 mb-3"><span class="info-tag-court">${m.court}</span><span class="info-tag-ref">⚖️ ${m.ref}</span></div>
                        <div class="text-7xl md:text-8xl font-black italic tabular-nums text-emerald-400 leading-none">${m.scoreA}:${m.scoreB}</div>
                        <div class="mt-4 flex flex-col items-center text-sm font-black text-slate-400 tracking-widest uppercase">
                             <div>${m.time} | ${m.id}</div>
                             <span class="${isLive ? 'bg-red-600 text-white px-6 py-1 rounded-full text-xs animate-pulse mt-2' : 'mt-2'}">${m.status}</span>
                        </div>
                    </div>
                    <div class="flex-1 text-center md:text-left text-2xl md:text-3xl font-black text-white px-4 break-words w-full">${displayB}</div>
                </div>`;
            }).join('');
        }

        function renderStandings() {
            const container = document.getElementById('page-standing');
            const configs = [
                {title:"男雙組",k:"男雙M",top:2,q:"取前 2"}, {title:"女雙 A 組",k:"女雙A",top:2,q:"取前 2"},
                {title:"女雙 B 組",k:"女雙B",top:2,q:"取前 2"}, {title:"混雙 A 組",k:"混雙A",top:2,q:"取前 2"},
                {title:"混雙 B 組",k:"混雙B",top:1,q:"取前 1"}, {title:"混雙 C 組",k:"混雙C",top:1,q:"取前 1"}
            ];
            container.innerHTML = configs.map(cfg => {
                const groupData = groupWinners[cfg.k] || {list:[], allFinished: false};
                return `<div class="bg-slate-900 rounded-[2rem] p-6 border border-white/5 shadow-2xl">
                    <div class="flex justify-between items-center mb-4"><h3 class="text-2xl font-black text-emerald-400 italic">${cfg.title}</h3><span class="bg-emerald-900 text-emerald-200 px-3 py-1 rounded-lg text-xs font-black uppercase">${cfg.q}</span></div>
                    <table class="w-full text-left">
                        <thead><tr class="text-slate-500 border-b border-white/10 text-xs font-black uppercase"><th class="py-2 pl-4">編號/隊名</th><th class="py-2 text-right">勝場</th><th class="py-2 text-right pr-4">總分</th></tr></thead>
                        <tbody>
                        ${groupData.list.map((d,i) => {
                            const isQualified = i < cfg.top;
                            const eliminationStyle = (groupData.allFinished && !isQualified) ? 'opacity-30' : 'opacity-100';
                            return `<tr class="border-b border-white/5 ${eliminationStyle} ${isQualified ? 'qualified-row' : ''}">
                                <td class="py-4 font-black text-lg pl-4"><span class="text-emerald-500 mr-2">[${d.code}]</span>${d.name}</td>
                                <td class="text-right font-black text-emerald-500">${d.win}</td>
                                <td class="text-right pr-4 font-black text-slate-400">${d.pts}</td>
                            </tr>`;
                        }).join('')}
                        </tbody>
                    </table>
                </div>`;
            }).join('');
        }

        function buildSymmetricBox(m, label, boxType, defaultA, defaultB) {
            const isF = boxType === "final", isT = boxType === "third", isLive = m.status === '進行中', isFinished = m.status === '已結束';
            
            let fA = (m.teamA && !m.teamA.match(/TBD|勝方|敗方|名|組/)) ? m.teamA : defaultA;
            let fB = (m.teamB && !m.teamB.match(/TBD|勝方|敗方|名|組/)) ? m.teamB : defaultB;
            
            // 冠亞季殿名號邏輯
            let tagA = "", tagB = "";
            if (isFinished) {
                if (m.scoreA > m.scoreB) {
                    tagA = isF ? " 🏆" : (isT ? " 🥉" : "");
                    tagB = isF ? " 🎖️" : ""; // 決賽輸家 = 亞軍 🎖️
                } else if (m.scoreB > m.scoreA) {
                    tagB = isF ? " 🏆" : (isT ? " 🥉" : "");
                    tagA = isF ? " 🎖️" : ""; // 決賽輸家 = 亞軍 🎖️
                }
            }
            
            // 冠軍強化樣式 (只針對冠軍)
            const winStyle = "text-5xl md:text-6xl text-yellow-300 drop-shadow-[0_0_15px_rgba(253,224,71,0.8)] scale-110 z-20";
            const styleA = (isF && isFinished && m.scoreA > m.scoreB) ? winStyle : "text-xl md:text-2xl";
            const styleB = (isF && isFinished && m.scoreB > m.scoreA) ? winStyle : "text-xl md:text-2xl";

            let liveClass = isLive ? (isF ? "status-live-final" : (isT ? "status-live-third" : "status-live")) : "";
            let styleClass = isF ? "final-gold" : (isT ? "third-box" : "sf-box");
            
            return `<div class="w-full max-w-[400px] rounded-[2.5rem] p-8 border-4 shadow-2xl transition-all ${styleClass} ${liveClass}">
                <div class="flex justify-between items-center mb-4"><span class="text-[10px] font-black bg-black/20 px-2 py-1 rounded uppercase">${label}</span><div class="flex gap-1"><span class="info-tag-court">${m.court}</span></div></div>
                <div class="space-y-6">
                    <div class="flex justify-between items-center gap-4">
                        <div class="font-black break-words flex-1 uppercase transition-all duration-500 ${styleA}">${fA}${tagA}</div>
                        <div class="text-4xl font-black italic">${m.scoreA}</div>
                    </div>
                    <div class="flex justify-between items-center gap-4">
                        <div class="font-black break-words flex-1 uppercase transition-all duration-500 ${styleB}">${fB}${tagB}</div>
                        <div class="text-4xl font-black italic">${m.scoreB}</div>
                    </div>
                </div>
                <div class="mt-4 text-center border-t border-black/10 pt-2 text-[10px] font-black opacity-60 uppercase">${m.status} | ${m.id}</div>
            </div>`;
        }

        function renderBracketFlow() {
            const container = document.getElementById('page-bracket'); container.innerHTML = "";
            ["女雙", "混雙"].forEach(cat => {
                const getWinnerName = (k, idx, def) => (groupWinners[k] && groupWinners[k].list[idx]) ? groupWinners[k].list[idx].name : def;
                let s1A = getWinnerName(cat+"A", 0, "A組1");
                let s1B = (cat === "女雙") ? getWinnerName("女雙B", 1, "B組2") : getWinnerName("混雙B", 0, "B組1");
                let s2A = (cat === "女雙") ? getWinnerName("女雙B", 0, "B組1") : getWinnerName("混雙A", 1, "A組2");
                let s2B = (cat === "女雙") ? getWinnerName("女雙A", 1, "A組2") : getWinnerName("混雙C", 0, "C組1");
                
                const getM = (idTag) => allData.find(m => m.type.includes(cat) && m.id.includes(idTag)) || {id:cat+idTag,teamA:"TBD",teamB:"TBD",scoreA:0,scoreB:0,status:"待賽",court:"待定"};
                const s1 = getM("四強1"), s2 = getM("四強2"), f = getM("冠亞"), t = getM("季殿");

                container.innerHTML += `<div class="flex flex-col items-center w-full px-4"><h2 class="text-6xl md:text-8xl font-black italic mb-12 opacity-10 uppercase tracking-tighter">${cat} FINALS</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-center justify-center w-full max-w-6xl">
                        <div class="flex flex-col items-center gap-4 w-full">${buildSymmetricBox(s1, `準決賽 1`, "sf", s1A, s1B)}</div>
                        <div class="flex flex-col gap-12 w-full items-center py-10 lg:py-0 border-y lg:border-y-0 lg:border-x border-white/5">
                            ${buildSymmetricBox(f, `👑 冠亞賽`, "final", "SF1 勝方", "SF2 勝方")}
                            ${buildSymmetricBox(t, `🥉 季殿賽`, "third", "SF1 敗方", "SF2 敗方")}
                        </div>
                        <div class="flex flex-col items-center gap-4 w-full">${buildSymmetricBox(s2, `準決賽 2`, "sf", s2A, s2B)}</div>
                    </div></div>`;
            });
        }

        function showPage(p) {
            ['matches', 'standing', 'bracket'].forEach(id => {
                const s = document.getElementById(`page-${id}`); const b = document.getElementById(`btn-${id}`);
                if(s) s.classList.add('hidden'); if(b) b.classList.remove('tab-active');
            });
            document.getElementById(`page-${p}`).classList.remove('hidden');
            document.getElementById(`btn-${p}`).classList.add('tab-active');
            window.scrollTo(0,0);
        }
        loadData(); setInterval(loadData, 10000);
    </script>
</body>
</html>
